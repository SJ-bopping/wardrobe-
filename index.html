  {type:'Pencil skirt',cat:'Skirt Cuts',icon:'✏️',color:'#FFF0F5',def:'A slim, fitted skirt that hugs the body from waist to hem \u2014 usually knee-length to mid-calf, often with a back vent or slit for ease of movement. A workwear staple.',details:[]},
  {type:'Tube skirt',cat:'Skirt Cuts',icon:'🧦',color:'#ECEFF1',def:'Very similar to a pencil skirt but made from stretchy knit fabric with no zip, seams or vent \u2014 just pulls on. Usually falls just above or below the knee.',details:[]},
  {type:'Straight skirt',cat:'Skirt Cuts',icon:'📏',color:'#F5F5F5',def:'The simplest skirt block \u2014 fitted at the waist with no flare or taper, falling in a clean straight line to the hem. The base pattern most other skirt styles are built from.',details:[]},
  {type:'Pleated skirt',cat:'Skirt Cuts',icon:'🪭',color:'#F3F0FF',def:'A skirt made of folded, pressed pleats running from waist to hem. Includes fine accordion pleats, one-directional knife pleats and wider box pleats \u2014 all add structured movement and volume.',details:[['Also called','Accordion, knife-pleated or box-pleated skirt']]},
  {type:'Wrap skirt',cat:'Skirt Cuts',icon:'🌀',color:'#FFF8E1',def:'A skirt that wraps around the waist and legs and fastens with a tie or button, leaving one panel overlapping the other at the front. A relaxed, easy option for casual wear.',details:[]},
  {type:'Sarong skirt',cat:'Skirt Cuts',icon:'🏖️',color:'#E8F5E9',def:'A length of fabric wrapped and knotted or tied around the body to form a skirt \u2014 inspired by traditional Southeast Asian dress. Draped, breezy and often beach or resort wear.',details:[]},
  {type:'Tulip skirt',cat:'Skirt Cuts',icon:'🌷',color:'#FDF0F8',def:'A skirt with overlapping curved front panels that tuck under at the hem, resembling the rounded petals of a tulip flower. Fitted at the hip with a softly bulbed silhouette.',details:[]},
  {type:'Draped skirt',cat:'Skirt Cuts',icon:'🎗️',color:'#FFF0F5',def:'A skirt with extra fabric pleated, gathered or draped asymmetrically on one side, creating soft diagonal folds. Also called a sarong skirt when the drape is achieved by wrapping.',details:[]},
  {type:'Asymmetrical skirt',cat:'Skirt Cuts',icon:'↗️',color:'#F3F0FF',def:'A skirt with a deliberately uneven hemline \u2014 higher on one side than the other, or curling at different levels around the body. Adds movement and a modern edge.',details:[]},
  {type:'High-low skirt',cat:'Skirt Cuts',icon:'📈',color:'#EDF7ED',def:'A skirt with a hem that is short at the front and long at the back \u2014 showing the legs while keeping length and drama behind.',details:[['Position','Short at front, long at back']]},
  {type:'Handkerchief hem skirt',cat:'Skirt Cuts',icon:'🔷',color:'#FFF0F5',def:'A skirt with an uneven pointed hem created from angled panels, hanging in points like the corners of a handkerchief. Romantic and bohemian, needs a soft flowing fabric.',details:[]},
  {type:'Tiered skirt',cat:'Skirt Cuts',icon:'🎂',color:'#FFF8E1',def:'A skirt built from horizontal layers, or tiers, of fabric that increase in width toward the hem \u2014 often gathered where they join. Comes in mini, knee or full length, frequently in patchwork prints.',details:[['Also called','Gypsy skirt']]},
  {type:'Gathered skirt',cat:'Skirt Cuts',icon:'〰️',color:'#FFF3E0',def:'A skirt with fullness gathered or shirred into the waistband using elastic or a drawstring, then flowing loosely to the hem. Simple to sew and comfortable to wear.',details:[['Also called','Dirndl skirt']]},
  {type:'Bubble skirt',cat:'Skirt Cuts',icon:'🫧',color:'#F3F0FF',def:'A skirt fitted at the waist with a hem that is tucked back under itself, creating a rounded, ballooned bubble effect at the bottom.',details:[['Also called','Balloon skirt']]},
  {type:'Godet skirt',cat:'Skirt Cuts',icon:'🔻',color:'#E3F2FD',def:'A skirt fitted through the hip with triangular fabric panels (godets) set into seams near the hem, adding sudden fullness and flare right at the bottom edge.',details:[]},
  {type:'Mermaid skirt',cat:'Skirt Cuts',icon:'🧜',color:'#E8F4FD',def:'A skirt fitted closely from waist to knee, then flaring out dramatically below the knee \u2014 mimicking a mermaid\u2019s tail. Best paired with a fitted top for an hourglass line.',details:[['Also called','Fishtail or trumpet skirt (flares slightly higher)']]},
  {type:'Peplum skirt',cat:'Skirt Cuts',icon:'🔔',color:'#FFF0F5',def:'A fitted skirt, usually pencil-based, with a short flared ruffle attached at the waistband \u2014 adding volume at the hip while keeping the rest of the skirt slim.',details:[]},
  {type:'Yoke skirt',cat:'Skirt Cuts',icon:'📐',color:'#EDF7ED',def:'A skirt with a fitted panel (the yoke) at the waist or hip, below which fuller, often gathered fabric falls. The fitted yoke flatters the waist while the skirt below adds volume.',details:[]},
  {type:'Paneled skirt',cat:'Skirt Cuts',icon:'🎏',color:'#E8F5E9',def:'A skirt made of several vertical panels, or gores, stitched together \u2014 usually fitted at the waist and flaring evenly toward the hem. Can have four or more panels.',details:[]},
  {type:'Peasant skirt',cat:'Skirt Cuts',icon:'🌾',color:'#FFF3E0',def:'A loose, relaxed skirt with an elasticated or smocked waist, often made of tiered or patchwork panels in bright colours \u2014 inspired by traditional folk dress. A boho staple.',details:[]},
  {type:'Ruffled skirt',cat:'Skirt Cuts',icon:'🎀',color:'#FDF0F8',def:'A skirt made of several stacked layers of ruffled fabric, creating volume and the illusion of curves. Playful and flirty, often seen in shorter lengths.',details:[]},
  {type:'Cowl skirt',cat:'Skirt Cuts',icon:'🌊',color:'#F3F0FF',def:'A skirt cut with extra fabric that drapes into soft, loose folds at the front or side, similar to a cowl neckline but applied to the skirt body. Needs a fluid fabric to fall correctly.',details:[]},
  // SHOULDER STYLES
  {type:'Structured shoulder',cat:'Shoulder Styles',icon:'🏗️',color:'#ECEFF1',def:'A shoulder with padding or internal structure that creates a defined angular shoulder point.',details:[]},
  {type:'Natural shoulder',cat:'Shoulder Styles',icon:'🌿',color:'#E8F5E9',def:'A shoulder that follows the natural slope and shape of the wearer — no padding or exaggeration.',details:[]},
  {type:'Exaggerated shoulder',cat:'Shoulder Styles',icon:'💪',color:'#FFF3E0',def:'An oversized dramatically wide or angular shoulder extending well beyond the natural shoulder point.',details:[['Also called','Power shoulder']]},
  {type:'Ruffle shoulder',cat:'Shoulder Styles',icon:'🌸',color:'#FFF0F5',def:'A shoulder with added ruffle or frill detail creating volume and decoration at the shoulder line.',details:[]},
  // WAISTLINES
  {type:'Natural waist',cat:'Waistlines',icon:'⏳',color:'#FFF8E1',def:'A waistline at the body natural narrowest point — typically around the belly button.',details:[['Position','Narrowest point of torso']]},
  {type:'High waist',cat:'Waistlines',icon:'⬆️',color:'#FDF0F8',def:'A waistline sitting above the natural waist — between the belly button and bottom of the ribs.',details:[['Position','Above the natural waist']]},
  {type:'Low rise',cat:'Waistlines',icon:'⬇️',color:'#E8F5E9',def:'A waistline sitting below the natural waist — on or below the hip bone.',details:[['Also called','Hip hugger'],['Position','At or below the hip bone']]},
  {type:'Empire waist',cat:'Waistlines',icon:'👑',color:'#F3F0FF',def:'A waistline just below the bust — much higher than the natural waist.',details:[['Also called','Regency waist'],['Position','Just below the bust']]},
  {type:'Elasticated waist',cat:'Waistlines',icon:'🔄',color:'#E3F2FD',def:'A waistband made entirely or partly from elastic, creating a stretchy adjustable fit.',details:[]},
  {type:'Drawstring waist',cat:'Waistlines',icon:'🪢',color:'#FFF3E0',def:'A waistband with a cord threaded through a channel that can be pulled and tied to adjust the fit.',details:[]},
  {type:'Dropped waistline',cat:'Waistlines',icon:'⬇️',color:'#ECEFF1',def:'A waist seam that sits low at the hip rather than at the natural waist, giving a relaxed, elongated-torso look. Iconic to 1920s flapper style.',details:[['Position','Seam sits at the hip, not the natural waist']]},
  {type:'Basque waistline',cat:'Waistlines',icon:'💗',color:'#FFF0F5',def:'A waist seam that dips down to a curved or pointed V at the centre front, rising back up to the natural waist at the sides. A structured, flattering bridal favourite.',details:[['Shape','V or curved point at centre front']]},
  {type:'Asymmetrical waistline',cat:'Waistlines',icon:'↗️',color:'#F3F0FF',def:'A waist seam that sits at an uneven, diagonal angle — higher on one side of the body than the other.',details:[['Shape','Diagonal, uneven around the body']]},
  {type:'High-low waistline',cat:'Waistlines',icon:'📈',color:'#EDF7ED',def:'A waist seam that curves unevenly around the body — higher in some places and dipping lower in others — rather than sitting at one consistent height.',details:[]},
  {type:'Round waistline',cat:'Waistlines',icon:'🌙',color:'#E8F4FD',def:'A waist seam that curves gently downward at the centre front in a shallow U shape — softer and less pointed than a basque waistline.',details:[['Shape','Shallow curved dip at centre front']]},
  {type:'Banded waist',cat:'Waistlines',icon:'📏',color:'#F5F5F5',def:'A separate strip of fabric stitched on as its own waistband, rather than the garment being shaped directly at the waist. Adds structure and a clean finish.',details:[]},
  {type:'Midriff yoke',cat:'Waistlines',icon:'🎗️',color:'#FFF3E0',def:'A fitted panel of fabric covering the midriff — between the bust and the natural waist — set in as its own seamed section rather than following the body\u2019s shape continuously.',details:[]},
  {type:'Hip yoke waist',cat:'Waistlines',icon:'📐',color:'#EDF7ED',def:'A fitted panel seamed in at the hip, below the natural waist, from which the rest of the garment falls or flares. Also called a bottom yoke.',details:[['Also called','Bottom yoke']]},
  {type:'Paperbag waist',cat:'Waistlines',icon:'🎀',color:'#FDF0F8',def:'A waistband with extra fabric gathered and folded over the top, then cinched with a tie or belt — puffing out above the waistline like the top of a paper bag.',details:[]},
  {type:'Princess waistline',cat:'Waistlines',icon:'👑',color:'#F3F0FF',def:'No waist seam at all — shaping is achieved instead through continuous vertical princess seams running from shoulder or armhole to hem, giving a smooth, naturally curved fit.',details:[]},
  {type:'Straight waistline',cat:'Waistlines',icon:'➖',color:'#ECEFF1',def:'A waist seam with no shaping or indentation at all — sitting in a plain straight line across the body, with no cinching in.',details:[]},
  {type:'Cinched waistline',cat:'Waistlines',icon:'🎗️',color:'#FFF0F5',def:'A waist pulled in tightly with a belt, tie or fitted band to create a sharply defined, nipped-in shape — regardless of the garment\u2019s natural cut.',details:[]},
  {type:'Shirred waist',cat:'Waistlines',icon:'〰️',color:'#E3F2FD',def:'A waist finished with several rows of stitched elastic shirring, creating a stretchy, gathered, textured band. Common in sundresses and peasant tops.',details:[['Also called','Scrunched or smocked waist']]},
  // JEAN STYLES
  {type:'Low-rise jeans',cat:'Jean Styles',icon:'⬇️',color:'#E3F2FD',def:'A waistband that sits below the hip bone, well under the natural waist. A 90s/Y2K staple having a moment again.',details:[['Position','Below the hip bone']]},
  {type:'High-rise jeans',cat:'Jean Styles',icon:'⬆️',color:'#E3F2FD',def:'A waistband that sits at or above the natural waist, near the navel. Flattering and a modern denim default.',details:[['Position','At or above the natural waist']]},
  {type:'Ripped jeans',cat:'Jean Styles',icon:'⚡',color:'#E3F2FD',def:'Deliberate distressed tears, rips or frayed holes — usually at the knee. Ranges from subtle slashes to heavily shredded.',details:[]},
  {type:'Cropped jeans',cat:'Jean Styles',icon:'✂️',color:'#E3F2FD',def:'Cut shorter than a standard inseam, ending above the ankle or mid-calf. Shows off shoes and works well with no-show socks.',details:[['Also called','Ankle length']]},

function buildTypeOptions(){
  const CATS=['Tops','Bottoms','Full outfit','Outerwear','Footwear','Hats','Bags','Jewellery','Loungewear & Sleepwear','Hosiery','Intimates','Swimwear','Other accessories'];
  return CATS.map(cat=>{
    const opts=GLOSSARY.filter(g=>g.cat===cat).map(g=>`<option>${g.type}</option>`).join('');
    return `<optgroup label="${cat.replace(/&/g,'&amp;')}">${opts}</optgroup>`;
  }).join('');
}

function rGlossary(tab){
  if(!window._gTab)window._gTab=tab||'cuts';
  if(tab)window._gTab=tab;
  if(!window._gCat)window._gCat='All';
  sCH(`<div class="ch"><div class="cht">📖 Style glossary</div><div class="chs">Fashion reference guide</div></div>`);
  sFB('');

async function saveCapsule(){
  const name=prompt('Name this capsule:');
  if(!name)return;
  const result=gi('capsule-result');
  const itemIds=[...result.querySelectorAll('[onclick^="openDetail"]')].map(el=>{
    const m=el.getAttribute('onclick').match(/openDetail\('([^']+)'\)/);
    return m?m[1]:null;
  }).filter(Boolean);
  const cap={
    id:'cap-'+Date.now(),
    name:name.trim(),
    season:window._capSeason||'All-season',
    style:window._capStyle||'Casual',
    itemIds,
    savedAt:Date.now(),
  };
  capsules.push(cap);
  await fbSave('capsules',cap);
  showToast('Capsule saved ✓');
  rCapsule();
}

function loadCapsule(id){
  const cap=capsules.find(c=>c.id===id);
  if(!cap)return;
  const capItems=cap.itemIds.map(id=>items.find(i=>i.id===id)).filter(Boolean);
  if(!capItems.length){showToast('No items found');return;}

  // Group by role
  const groups={};
  capItems.forEach(i=>{
    const role=TOP_TYPES.includes(i.subtype||'')?'Top':BOT_TYPES.includes(i.subtype||'')?'Bottom':OUT_TYPES.includes(i.subtype||'')?'Outerwear':DRS_TYPES.includes(i.subtype||'')?'Dress / One-piece':SHO_TYPES.includes(i.subtype||'')?'Footwear':'Accessory';
    if(!groups[role])groups[role]=[];
    groups[role].push(i);
  });

  const roleEmojis={'Top':'👕','Bottom':'👖','Outerwear':'🧥','Dress / One-piece':'👗','Footwear':'👟','Accessory':'💎'};
  const tCount=capItems.filter(i=>TOP_TYPES.includes(i.subtype||'')).length;
  const bCount=capItems.filter(i=>BOT_TYPES.includes(i.subtype||'')).length;
  const dCount=capItems.filter(i=>DRS_TYPES.includes(i.subtype||'')).length;

  const html=`<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn sm" onclick="rCapsule()">← Back</button>
      <div style="font-family:'DM Serif Display',serif;font-size:18px">${cap.name}</div>
    </div>
    <div style="background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;gap:16px;align-items:center">
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:700">${capItems.length}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Pieces</div></div>
      <div style="width:1px;height:32px;background:var(--border2)"></div>
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:700">${tCount*bCount+dCount}+</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Combos</div></div>
      <div style="width:1px;height:32px;background:var(--border2)"></div>
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:700">${cap.season.slice(0,3)}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Season</div></div>
    </div>
    ${Object.entries(groups).map(([role,roleItems])=>`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${roleEmojis[role]||'📦'} ${role} (${roleItems.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">
          ${roleItems.map(i=>{const cat=cats.find(c=>c.id===i.category);const fp=(i.photos||[])[0]||null;return`<div class="card" onclick="openDetail('${i.id}')" style="padding:0;overflow:hidden;cursor:pointer">${fp?`<img src="${fp}" style="width:100%;height:110px;object-fit:cover">`:`<div style="width:100%;height:110px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px">${cat?.icon||'👕'}</div>`}<div style="padding:8px"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.name}</div><div style="font-size:10px;color:var(--text2)">${i.subtype||''}</div></div></div>`;}).join('')}
        </div>
      </div>
    `).join('')}
  </div>`;

  gi('capsule-result').innerHTML=html;
}

async function deleteCapsule(id){
  if(!confirm('Delete this capsule?'))return;
  capsules=capsules.filter(c=>c.id!==id);
  await fbSave('capsules',{id,_deleted:true});
  await window.fbDel('capsules',id);
  showToast('Deleted ✓');
  rCapsule();
}

// ── OUTFIT HISTORY ────────────────────────────────────────────────────────────
let _histMonth=null,_histYear=null;

function rHistory(){
  const now=new Date();
  if(!_histMonth)_histMonth=now.getMonth();
  if(!_histYear)_histYear=now.getFullYear();

  sCH(`<div class="ch"><div class="cht">👗 Outfit history</div><div class="chs">What you wore, day by day</div></div>`);
  sFB('');

  const mo=_histMonth,yr=_histYear;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const firstDay=(new Date(yr,mo,1).getDay()+6)%7; // Mon=0
  const monthName=new Date(yr,mo,1).toLocaleString('default',{month:'long',year:'numeric'});

  // Build lookup: date string → array of outfits worn that day
  const lookup={};
  outfits.filter(o=>o.wornDates?.length).forEach(o=>{
    (o.wornDates||[]).forEach(d=>{
      if(!lookup[d])lookup[d]=[];
      lookup[d].push(o);
    });
  });

  // Also check single o.date field for backwards compat
  outfits.filter(o=>o.date&&!o.wornDates?.length).forEach(o=>{
    if(!lookup[o.date])lookup[o.date]=[];
    lookup[o.date].push(o);
  });

  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  let cells='';
  // Empty cells before first day
  for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  // Day cells
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayOutfits=lookup[dateStr]||[];
    const isToday=d===now.getDate()&&mo===now.getMonth()&&yr===now.getFullYear();
    const hasOutfits=dayOutfits.length>0;
    const photos=dayOutfits.map(o=>(o.photos||[])[0]).filter(Boolean);
    cells+=`<div onclick="openDayLog('${dateStr}')" style="cursor:pointer;border-radius:10px;border:1.5px solid ${isToday?'var(--accent)':hasOutfits?'var(--border2)':'var(--border)'};background:${isToday?'var(--accent-soft, #f5f0e8)':hasOutfits?'var(--bg2)':'var(--bg)'};padding:6px;min-height:72px;display:flex;flex-direction:column;gap:3px;transition:border-color .15s">

      ${photos.length?`<img src="${photos[0]}" style="width:100%;height:40px;object-fit:cover;border-radius:6px">`:
        hasOutfits?`<div style="font-size:18px;text-align:center;margin-top:4px">${dayOutfits[0].name?dayOutfits[0].name[0]:'👗'}</div>`:
        ''}
      ${dayOutfits.length>1?`<div style="font-size:9px;color:var(--text3);text-align:right">+${dayOutfits.length-1}</div>`:''}
    </div>`;
  }

  // Month stats
  const thisMonthDates=Object.keys(lookup).filter(d=>d.startsWith(`${yr}-${String(mo+1).padStart(2,'0')}`));
  const daysLogged=thisMonthDates.length;
  const outfitsLogged=thisMonthDates.reduce((a,d)=>a+lookup[d].length,0);

  sCt(`
    <div style="padding:14px 16px">
      <!-- Month nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <button onclick="_histMonth--;if(_histMonth<0){_histMonth=11;_histYear--;}rHistory()" style="border:none;background:var(--bg2);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">‹</button>
        <div style="font-family:'DM Serif Display',serif;font-size:18px">${monthName}</div>
        <button onclick="_histMonth++;if(_histMonth>11){_histMonth=0;_histYear++;}rHistory()" style="border:none;background:var(--bg2);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">›</button>
      </div>
      <!-- Stats row -->
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:10px 12px;text-align:center">
          <div style="font-size:20px;font-weight:700">${daysLogged}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Days logged</div>
        </div>
        <div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:10px 12px;text-align:center">
          <div style="font-size:20px;font-weight:700">${outfitsLogged}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Outfits worn</div>
        </div>
        <div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:10px 12px;text-align:center">
          <div style="font-size:20px;font-weight:700">${daysInMonth>0?Math.round(daysLogged/daysInMonth*100):0}%</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Coverage</div>
        </div>
      </div>
      <!-- Day headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
        ${days.map(d=>`<div style="font-size:10px;font-weight:700;color:var(--text3);text-align:center;padding:2px 0">${d}</div>`).join('')}
      </div>

      <button class="btn pr" onclick="openDayLog('${now.toISOString().slice(0,10)}')" style="width:100%;margin-top:14px">+ Log today's outfit</button>
    </div>
  `);
}

          ${fp?`<img src="${fp}" style="width:40px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0">`:`<div style="width:40px;height:40px;border-radius:7px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">👗</div>`}

      <input type="text" id="dlSearch" placeholder="Search outfits..." oninput="filterDayOutfits('${dateStr}')" style="width:100%;height:34px;padding:0 10px;border-radius:var(--r);border:1px solid var(--border2);font-size:13px;margin-bottom:8px;background:var(--bg);color:var(--text)">

        ${outfits.filter(o=>!(o.wornDates||[]).includes(dateStr)).map(o=>{const fp=(o.photos||[])[0];const tg=(o.items||[]).map(id=>items.find(i=>i.id===id)).filter(Boolean);return`<div class="dlItem" data-name="${(o.name||'').toLowerCase()}" style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;background:var(--bg)" onclick="addWornDate('${o.id}','${dateStr}')">
          ${fp?`<img src="${fp}" style="width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0">`:`<div style="width:36px;height:36px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">👗</div>`}
          <div><div style="font-size:13px;font-weight:600">${o.name}</div><div style="font-size:11px;color:var(--text2)">${tg.slice(0,3).map(t=>t.name).join(', ')||'No items'}</div></div>
        </div>`;}).join('')}
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <button class="btn sm pr" style="width:100%" onclick="cm('day-log-modal');openAddOutfit()">+ Create new outfit</button>
      </div>
    </div></div>`;
    om('day-log-modal');
  }
  renderModal();
  window._dayLogDate=dateStr;
  window._renderDayLog=renderModal;
}

function filterDayOutfits(dateStr){
  const q=(gi('dlSearch')?.value||'').toLowerCase();
  gi('dlList')?.querySelectorAll('.dlItem').forEach(el=>{
    el.style.display=el.dataset.name.includes(q)?'flex':'none';
  });
}

async function addWornDate(outfitId,dateStr){
  const o=outfits.find(x=>x.id===outfitId);if(!o)return;
  const dates=[...new Set([...(o.wornDates||[]),dateStr])];
  o.wornDates=dates;
  o.wornCount=(o.wornCount||0)+1;
  await fbSave('outfits',o);
  showToast('Outfit logged ✓');
  if(window._renderDayLog)window._renderDayLog();
  if(window._histMonth!==null)setTimeout(rHistory,300);
}

async function removeWornDate(outfitId,dateStr){
  const o=outfits.find(x=>x.id===outfitId);if(!o)return;
  o.wornDates=(o.wornDates||[]).filter(d=>d!==dateStr);
  if(o.wornCount>0)o.wornCount--;
  await fbSave('outfits',o);
  showToast('Removed ✓');
  if(window._renderDayLog)window._renderDayLog();
  if(window._histMonth!==null)setTimeout(rHistory,300);
}

function buildCapsule(season, style, size){
  if(!items.length)return`<div class="empty"><div class="ei">👗</div><p>Add items to your wardrobe first.</p></div>`;

  // Filter items by season
  const pool=items.filter(i=>{
    if(season!=='All-season'&&i.season&&i.season!==season&&i.season!=='All-season')return false;
    return true;
  });

  if(pool.length<3)return`<div class="empty"><div class="ei">🔍</div><p>Not enough items for this season. Add more!</p></div>`;

  // Score items by style match
  const styleKeywords={
    'Casual':['casual','everyday','relaxed'],
    'Smart casual':['smart','smart casual','work'],
    'Work':['formal','work','business','smart'],
    'Evening':['evening','formal','party'],
    'Weekend':['casual','weekend','relaxed'],
    'Travel':['casual','all-season','versatile'],
  };
  const keywords=styleKeywords[style]||[];

  function scoreItem(item){
    let s=item.wornCount||0;
    if(keywords.some(k=>(item.occasion||'').toLowerCase().includes(k)))s+=3;
    if(item.condition==='Excellent'||item.condition==='Good')s+=1;
    return s+(Math.random()*2*(window._capSeed||1)%3);
  }

  // Build balanced capsule by category
  const tops=pool.filter(i=>TOP_TYPES.includes(i.subtype||'')).sort((a,b)=>scoreItem(b)-scoreItem(a));
  const bots=pool.filter(i=>BOT_TYPES.includes(i.subtype||'')).sort((a,b)=>scoreItem(b)-scoreItem(a));
  const outs=pool.filter(i=>OUT_TYPES.includes(i.subtype||'')).sort((a,b)=>scoreItem(b)-scoreItem(a));
  const drss=pool.filter(i=>DRS_TYPES.includes(i.subtype||'')).sort((a,b)=>scoreItem(b)-scoreItem(a));
  const shoe=pool.filter(i=>SHO_TYPES.includes(i.subtype||'')).sort((a,b)=>scoreItem(b)-scoreItem(a));
  const accs=pool.filter(i=>ACC_TYPES.includes(i.subtype||'')).sort((a,b)=>scoreItem(b)-scoreItem(a));

  // Allocate slots proportionally
  const capsule=[];
  const topN=Math.min(Math.ceil(size*0.30),tops.length);
  const botN=Math.min(Math.ceil(size*0.25),bots.length);
  const outN=Math.min(Math.ceil(size*0.15),outs.length);
  const drsN=Math.min(Math.ceil(size*0.15),drss.length);
  const shoN=Math.min(Math.ceil(size*0.10),shoe.length);
  const accN=Math.min(size-topN-botN-outN-drsN-shoN,accs.length);

  tops.slice(0,topN).forEach(i=>capsule.push({...i,_role:'Top'}));
  bots.slice(0,botN).forEach(i=>capsule.push({...i,_role:'Bottom'}));
  outs.slice(0,outN).forEach(i=>capsule.push({...i,_role:'Outerwear'}));
  drss.slice(0,drsN).forEach(i=>capsule.push({...i,_role:'Dress / One-piece'}));
  shoe.slice(0,shoN).forEach(i=>capsule.push({...i,_role:'Footwear'}));
  accs.slice(0,Math.max(0,accN)).forEach(i=>capsule.push({...i,_role:'Accessory'}));

  if(!capsule.length)return`<div class="empty"><div class="ei">🔍</div><p>No items match this season and style.</p></div>`;

  // Count outfit combinations possible
  const tCount=capsule.filter(i=>TOP_TYPES.includes(i.subtype||'')).length;
  const bCount=capsule.filter(i=>BOT_TYPES.includes(i.subtype||'')).length;
  const dCount=capsule.filter(i=>DRS_TYPES.includes(i.subtype||'')).length;
  const combos=(tCount*bCount)+dCount;

  // Group by role for display
  const groups={};
  capsule.forEach(i=>{if(!groups[i._role])groups[i._role]=[];groups[i._role].push(i);});

  const roleEmojis={'Top':'👕','Bottom':'👖','Outerwear':'🧥','Dress / One-piece':'👗','Footwear':'👟','Accessory':'💎'};

  return`<div>
    <div style="background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;gap:16px;align-items:center">
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:700">${capsule.length}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Pieces</div></div>
      <div style="width:1px;height:32px;background:var(--border2)"></div>
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:700">${combos}+</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Outfit combos</div></div>
      <div style="width:1px;height:32px;background:var(--border2)"></div>
      <div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:700">${season==='All-season'?'All':season.slice(0,3)}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Season</div></div>
    </div>
    ${Object.entries(groups).map(([role,roleItems])=>`
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${roleEmojis[role]||'📦'} ${role} (${roleItems.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">
          ${roleItems.map(i=>{
            const cat=cats.find(c=>c.id===i.category);
            const photos=i.photos||[];
            const fp=photos[0]||null;
            return`<div class="card" onclick="openDetail('${i.id}')" style="padding:0;overflow:hidden;cursor:pointer">
              ${fp?`<img src="${fp}" style="width:100%;height:110px;object-fit:cover">`:`<div style="width:100%;height:110px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px">${cat?.icon||'👕'}</div>`}
              <div style="padding:8px">
                <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.name}</div>
                <div style="font-size:10px;color:var(--text2)">${i.subtype||i.category||''}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `).join('')}
    <div style="margin-top:8px;padding:12px 14px;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--text2);line-height:1.6">
      💡 <strong>Tip:</strong> Every top pairs with every bottom — that's ${tCount}×${bCount}=${tCount*bCount} combinations, plus ${dCount} dress${dCount!==1?'es':''} you can wear solo.
    </div>
    <button class="btn pr" onclick="saveCapsule()" style="width:100%;margin-top:12px">💾 Save this capsule</button>
  </div>`;
}

// ── TAG SYSTEM ────────────────────────────────────────────────────────────────
let _currentTags=[];

function initTagPicker(existingTags=[]){
  _currentTags=[...existingTags];
  renderTagDisplay();
  updateHiddenTagInput();
  // Highlight active quick tags
  document.querySelectorAll('.qtag').forEach(btn=>{
    const t=btn.dataset.tag;
    btn.style.background=_currentTags.includes(t)?'var(--accent)':'var(--bg)';
    btn.style.color=_currentTags.includes(t)?'var(--afg)':'var(--text)';
    btn.style.borderColor=_currentTags.includes(t)?'var(--accent)':'var(--border2)';
  });
}

function renderTagDisplay(){
  const el=gi('f-tags-display');
  if(!el)return;
  el.innerHTML=_currentTags.length
    ?_currentTags.map((t,i)=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--accent);color:var(--afg);font-size:11px;font-weight:500">${t}<button type="button" onclick="removeTag(${i})" style="border:none;background:none;color:var(--afg);cursor:pointer;padding:0;line-height:1;font-size:13px">×</button></span>`).join('')
    :`<span style="font-size:11px;color:var(--text3)">No tags yet</span>`;
}

function updateHiddenTagInput(){
  const el=gi('f-tags');
  if(el)el.value=_currentTags.join(',');
}

function removeTag(idx){
  const t=_currentTags[idx];
  _currentTags.splice(idx,1);
  renderTagDisplay();
  updateHiddenTagInput();
  // Update quick tag button state
  document.querySelectorAll('.qtag').forEach(btn=>{
    if(btn.dataset.tag===t){
      btn.style.background='var(--bg)';
      btn.style.color='var(--text)';
      btn.style.borderColor='var(--border2)';
    }
  });
}

function toggleQuickTag(tag){
  if(_currentTags.includes(tag)){
    _currentTags=_currentTags.filter(t=>t!==tag);
  } else {
    _currentTags.push(tag);
  }
  renderTagDisplay();
  updateHiddenTagInput();
  // Update button style
  document.querySelectorAll('.qtag').forEach(btn=>{
    if(btn.dataset.tag===tag){
      const active=_currentTags.includes(tag);
      btn.style.background=active?'var(--accent)':'var(--bg)';
      btn.style.color=active?'var(--afg)':'var(--text)';
      btn.style.borderColor=active?'var(--accent)':'var(--border2)';
    }
  });
}

function addTag(tag){
  const t=tag.trim();
  if(!t||_currentTags.includes(t))return;
  _currentTags.push(t);
  renderTagDisplay();
  updateHiddenTagInput();
  const inp=gi('f-tags-input');
  if(inp)inp.value='';
  hideTagSuggestions();
  // Update quick tag if it matches
  document.querySelectorAll('.qtag').forEach(btn=>{
    if(btn.dataset.tag===t){
      btn.style.background='var(--accent)';
      btn.style.color='var(--afg)';
      btn.style.borderColor='var(--accent)';
    }
  });
}

function showTagSuggestions(){
  const inp=gi('f-tags-input');
  const box=gi('tag-suggestions');
  if(!inp||!box)return;
  const q=inp.value.trim().toLowerCase();
  if(!q){hideTagSuggestions();return;}

  // Gather all existing tags from wardrobe + glossary cuts
  const existingTags=[...new Set(items.flatMap(i=>i.tags||[]))].sort();
  const glossaryTags=[...new Set(GLOSSARY.filter(g=>['Necklines','Sleeve Styles','Fits','Hem Lengths','Collar Styles','Waistlines','Silhouettes'].includes(g.cat)).map(g=>g.type))];
  const quickTags=['Favourite','Gift','Vintage','Thrifted','Sentimental','New','Sale find','Borrowed','Seasonal'];
  const allSuggestions=[...new Set([...quickTags,...existingTags,...glossaryTags])].filter(t=>t.toLowerCase().includes(q)&&!_currentTags.includes(t));

  if(!allSuggestions.length&&q){
    box.innerHTML=`<div onclick="addTag('${q}')" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)">+ Add "<strong>${q}</strong>"</div>`;
    box.style.display='block';
    return;
  }
  if(!allSuggestions.length){hideTagSuggestions();return;}
  box.innerHTML=allSuggestions.slice(0,8).map(t=>`<div onclick="addTag('${t}')" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">${t}</div>`).join('');
  // Add option to create new tag if it doesn't exactly match
  if(!allSuggestions.some(t=>t.toLowerCase()===q)){
    box.innerHTML+=`<div onclick="addTag('${q}')" style="padding:9px 12px;cursor:pointer;font-size:13px;color:var(--text2)" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">+ Create "<strong>${q}</strong>"</div>`;
  }
  box.style.display='block';
}

function hideTagSuggestions(){
  const box=gi('tag-suggestions');
  if(box)box.style.display='none';
}

function tagInputKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const inp=gi('f-tags-input');
    if(inp?.value.trim())addTag(inp.value);
  }
  if(e.key==='Escape')hideTagSuggestions();
}

document.addEventListener('click',e=>{
  if(!e.target.closest('#f-tags-input')&&!e.target.closest('#tag-suggestions'))hideTagSuggestions();
});

window._activeQTab='Recent';
function switchQTab(tab){
  window._activeQTab=tab;
  // Update pill styles
  ['Recent','General','Necklines','Collar Styles','Sleeve Styles','Bra Types','Panty Types','Hem Lengths','Dress Cuts','Skirt Cuts','Jean Styles','Waistlines','Heel Heights','Prints & Patterns','Embellishments','Closures & Details'].forEach(t=>{
    const el=document.getElementById('qtab-'+t.replace(/[^a-zA-Z]/g,''));
    if(!el)return;
    el.style.background=t===tab?'var(--accent)':'var(--bg)';
    el.style.color=t===tab?'var(--afg)':'var(--text2)';
  });
  renderQTabContent();
}

function renderQTabContent(){
  const tab=window._activeQTab||'Recent';
  const box=gi('qtab-content');
  if(!box)return;

  const GENERAL_TAGS=['Favourite','Gift','Vintage','Thrifted','Sentimental','New','Sale find','Borrowed','Seasonal'];
  const GLOSSARY_TABS=['Necklines','Collar Styles','Sleeve Styles','Bra Types','Panty Types','Hem Lengths','Dress Cuts','Skirt Cuts','Jean Styles','Waistlines','Heel Heights','Prints & Patterns','Embellishments','Closures & Details'];

  let tags=[];
  if(tab==='Recent'){
    // Most recently used tags across all items
    const freq={};
    items.forEach(i=>(i.tags||[]).forEach(t=>{freq[t]=(freq[t]||0)+1;}));
    tags=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([t])=>t);
    if(!tags.length)tags=GENERAL_TAGS.slice(0,8);
  } else if(tab==='General'){
    tags=GENERAL_TAGS;
  } else if(GLOSSARY_TABS.includes(tab)){
    tags=GLOSSARY.filter(g=>g.cat===tab).map(g=>g.type);
  }

  box.innerHTML=tags.map(t=>{
    const active=_currentTags.includes(t);
    return`<button type="button" onclick="toggleQuickTag('${t}')" class="qtag" data-tag="${t}" style="padding:3px 9px;border-radius:99px;font-size:11px;border:1px solid ${active?'var(--accent)':'var(--border2)'};background:${active?'var(--accent)':'var(--bg)'};color:${active?'var(--afg)':'var(--text)'};cursor:pointer;font-family:'DM Sans',sans-serif">${t}</button>`;
  }).join('');
}

// Override initTagPicker to also render tab content
const _origInitTagPicker=initTagPicker;
function initTagPicker(existingTags=[]){
  _currentTags=[...existingTags];
  renderTagDisplay();
  updateHiddenTagInput();
  window._activeQTab='Recent';
  // Reset all tab pills
  ['Recent','General','Necklines','Collar Styles','Sleeve Styles','Bra Types','Panty Types','Hem Lengths','Dress Cuts','Skirt Cuts','Jean Styles','Waistlines','Heel Heights','Prints & Patterns','Embellishments','Closures & Details'].forEach(t=>{
    const el=document.getElementById('qtab-'+t.replace(/[^a-zA-Z]/g,''));
    if(!el)return;
    el.style.background=t==='Recent'?'var(--accent)':'var(--bg)';
    el.style.color=t==='Recent'?'var(--afg)':'var(--text2)';
  });
  setTimeout(renderQTabContent,50);
}

// ── TAG SEARCH IN ALL CLOTHES ─────────────────────────────────────────────────
</script>
