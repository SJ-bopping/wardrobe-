  {type:'Dangle earrings',cat:'Jewellery',icon:'✨',color:'#FDF0F8',def:'Earrings with a longer more dramatic drop below the earlobe. Often feature movement or multiple components.',details:[]},
  {type:'Ear cuff',cat:'Jewellery',icon:'🌙',color:'#F3F0FF',def:'A piece of jewellery that wraps around or clips onto the outer edge of the ear without piercing. Edgy and contemporary.',details:[]},
  {type:'Bracelet',cat:'Jewellery',icon:'✨',color:'#FFF0F5',def:'A decorative band worn around the wrist. Available in chain, bangle, cuff and beaded styles.',details:[]},
  {type:'Anklet',cat:'Jewellery',icon:'🦶',color:'#FFF8E1',def:'A decorative chain or bracelet worn around the ankle. Delicate and feminine — usually in fine chain or beaded styles.',details:[]},
  {type:'Anklet chain',cat:'Jewellery',icon:'⛓️',color:'#ECEFF1',def:'A fine chain anklet, usually in gold or silver. Minimal and delicate.',details:[]},
  {type:'Body chain',cat:'Jewellery',icon:'💫',color:'#F3F0FF',def:'A large decorative chain worn across the body — connecting the neck, waist or hips. Statement and fashion-forward.',details:[]},
  {type:'Ring',cat:'Jewellery',icon:'💍',color:'#FFF0F5',def:'A circular band or jewelled piece worn on the finger. Ranges from simple bands to elaborate gemstone styles.',details:[]},
  {type:'Signet ring',cat:'Jewellery',icon:'🔏',color:'#ECEFF1',def:'A ring with a flat engraved surface, traditionally bearing a family crest or initials. Now a fashion staple in plain or engraved styles.',details:[]},
  {type:'Cocktail ring',cat:'Jewellery',icon:'💎',color:'#F3F0FF',def:'A large bold statement ring usually featuring an oversized gemstone or decorative centrepiece. Designed to be noticed.',details:[]},
  {type:'Brooch',cat:'Jewellery',icon:'🌸',color:'#FFF0F5',def:'A decorative pin fastened to clothing with a clasp at the back. Vintage-inspired and distinctive — worn on lapels, collars or scarves.',details:[]},
  {type:'Brooch pin',cat:'Jewellery',icon:'📌',color:'#FFF8E1',def:'A simple pin-style brooch with a decorative front. Smaller and more subtle than a full brooch.',details:[]},
  {type:'Hair clip',cat:'Jewellery',icon:'🎀',color:'#FFF0F5',def:'A clip fastened into the hair as a decorative or functional accessory. Ranges from simple metal clips to embellished styles.',details:[]},
  {type:'Hair pin',cat:'Jewellery',icon:'📍',color:'#FFF8E1',def:'A thin pin slid into the hair to hold it in place. More minimal than a hair clip — often used to create updos.',details:[]},
  {type:'Barrette',cat:'Jewellery',icon:'✂️',color:'#FDF0F8',def:'A clasp-style hair accessory that snaps shut to hold a section of hair. Ranges from simple metal to embellished styles.',details:[]},
  {type:'Scrunchie',cat:'Jewellery',icon:'🌈',color:'#FFF0F5',def:'A fabric-covered elastic hair tie. Gentler on hair than a regular elastic — available in countless fabrics and prints.',details:[]},
  {type:'Watch',cat:'Jewellery',icon:'⌚',color:'#E8F4FD',def:'A timepiece worn on the wrist. Ranges from simple minimalist designs to luxury statement pieces. One of the most understated accessories.',details:[]},
  {type:'Cloth clip',cat:'Jewellery',icon:'🖇️',color:'#FFF3E0',def:'A decorative clip used to gather or accessorise clothing — pinching fabric at the waist, neckline or sleeve for a customised fit or decorative effect.',details:[]},
  // LOUNGEWEAR & SLEEPWEAR
  {type:'Pajamas',cat:'Loungewear & Sleepwear',icon:'😴',color:'#E3F2FD',def:'A matching set of loose top and bottoms designed for sleeping. Usually in cotton, silk or flannel — ranges from casual to luxurious.',details:[]},
  {type:'Loungewear set',cat:'Loungewear & Sleepwear',icon:'🛋️',color:'#F3F0FF',def:'A matching top and bottom set designed for relaxing at home. Usually in soft jersey, fleece or ribbed fabric — comfortable enough for the sofa, stylish enough for a quick errand.',details:[]},
  {type:'Shorts set',cat:'Loungewear & Sleepwear',icon:'☀️',color:'#FFF8E1',def:'A matching top and shorts combination for warm weather lounging. Usually in cotton, jersey or satin.',details:[]},
  {type:'Robe',cat:'Loungewear & Sleepwear',icon:'🥋',color:'#FFF3E0',def:'A long loose garment worn open at the front, belted or unbelted. Worn over sleepwear in the morning or as a cover-up. Available in terry cloth, silk, satin and fleece.',details:[]},
  {type:'Nightgown',cat:'Loungewear & Sleepwear',icon:'🌙',color:'#E8F4FD',def:'A loose dress-like garment worn to bed. Usually in lightweight fabric like cotton, silk or chiffon — ranging from simple to decorative.',details:[]},
  {type:'Slip',cat:'Loungewear & Sleepwear',icon:'✨',color:'#FFF8E1',def:'A lightweight sleeveless undergarment worn under dresses or skirts, or as sleepwear. Usually in satin or silk — smooth and minimal.',details:[]},
  {type:'Onesie',cat:'Loungewear & Sleepwear',icon:'🐻',color:'#E8F5E9',def:'A one-piece full-body garment with long sleeves and legs, usually in fleece or jersey. Cosy, fun and completely impractical for anything other than staying warm.',details:[]},
  {type:'Thermal set',cat:'Loungewear & Sleepwear',icon:'🌡️',color:'#ECEFF1',def:'A close-fitting matching top and bottom in thermal fabric designed to retain body heat. Worn as a base layer under clothes or as sleepwear in cold weather.',details:[]},
  {type:'Sweatpants',cat:'Loungewear & Sleepwear',icon:'👖',color:'#ECEFF1',def:'Loose casual trousers in fleece or jersey fabric. Originally sportswear, now a loungewear and streetwear staple.',details:[]},
  {type:'Sweatshirt',cat:'Loungewear & Sleepwear',icon:'👕',color:'#E8F4FD',def:'A casual long-sleeved top in fleece or cotton jersey with no hood. Relaxed and comfortable — a wardrobe basic.',details:[]},
  {type:'Joggers',cat:'Loungewear & Sleepwear',icon:'🏃',color:'#E8F5E9',def:'Tapered casual trousers in jersey or fleece with an elasticated waist and cuffed ankles. More fitted than sweatpants — smarter for casual outerwear.',details:[]},
  // HOSIERY
  {type:'Tights',cat:'Hosiery',icon:'🦵',color:'#ECEFF1',def:'A close-fitting garment covering the legs and lower body from waist to toe. Available in sheer, opaque and patterned styles. Worn under skirts, dresses and shorts.',details:[]},
  {type:'Knee-high socks',cat:'Hosiery',icon:'🧦',color:'#E8F4FD',def:'Socks extending up to the knee. Functional in cold weather but also a fashion statement — particularly popular with mini skirts and school-inspired looks.',details:[]},
  {type:'Ankle socks',cat:'Hosiery',icon:'🧦',color:'#E8F5E9',def:'Short socks ending at or just above the ankle. The most common everyday sock — casual and practical.',details:[]},
  {type:'Leg warmers',cat:'Hosiery',icon:'🩰',color:'#FDF0F8',def:'Thick knitted tubes worn around the lower leg for warmth. Originally dancewear, now a fashion accessory. Usually worn scrunched down or pushed up.',details:[]},
  {type:'Thermal wear',cat:'Hosiery',icon:'🌡️',color:'#E3F2FD',def:'Close-fitting base layer pieces designed to retain body heat. Usually in a thin technical or fleece fabric — worn under clothing in cold weather for invisible warmth.',details:[]},
  // INTIMATES
  {type:'Underwear',cat:'Intimates',icon:'🩲',color:'#FFF0F5',def:'Undergarments worn next to the skin beneath outer clothing. Available in countless cuts from briefs to thongs in cotton, lace or microfibre.',details:[]},
  {type:'Boyshort',cat:'Intimates',icon:'🩳',color:'#EDF7ED',def:'A mid-rise, boxer-inspired cut with straight, longer leg openings extending toward the upper thigh — full coverage of the hips, rear and upper thigh.',details:[]},
  {type:'Thong',cat:'Intimates',icon:'🧵',color:'#FFEBEE',def:'A bikini-like front with the rear reduced to a thin T- or Y-shaped strip of fabric that sits between the cheeks, leaving most of the rear exposed but keeping a visible hip waistband.',details:[]},
  {type:'G-string',cat:'Intimates',icon:'➖',color:'#FDF0F8',def:'The most minimal cut — no fabric panel at the rear at all, just a thin string connecting a small front pouch to the waistband, leaving the entire rear exposed.',details:[]},
  {type:'Bra',cat:'Intimates',icon:'👙',color:'#FDF0F8',def:'An undergarment that supports the chest. Available in countless styles from underwired to wireless, padded to unlined.',details:[]},
  {type:'T-shirt bra',cat:'Intimates',icon:'⚪',color:'#E8F4FD',def:'A smooth, seamless bra with lightly padded or molded cups designed to be invisible under fitted tops. The most reached-for everyday bra style.',details:[]},
  {type:'Sports bra',cat:'Intimates',icon:'🏃',color:'#E8F5E9',def:'A supportive bra built for exercise using compression, individually molded cups, or both to minimise bounce. Moisture-wicking and often racerback-styled, rated by impact level.',details:[]},
  {type:'Bralette',cat:'Intimates',icon:'🎀',color:'#FFF0F5',def:'An unstructured, wire-free pullover bra in soft or lace fabric with minimal padding. Prioritises comfort and style over shaping — often worn as outerwear.',details:[]},
  {type:'Strapless bra',cat:'Intimates',icon:'➖',color:'#FDF0F8',def:'A bra with no shoulder straps that relies on a wide, firm band and reinforced boning for support. Worn under strapless or off-shoulder outfits.',details:[]},
  {type:'Convertible bra',cat:'Intimates',icon:'🔄',color:'#F3F0FF',def:'A bra with detachable straps that can be reconfigured — halter, criss-cross, one-shoulder or strapless — to suit different necklines.',details:[]},
  {type:'Minimizer bra',cat:'Intimates',icon:'📉',color:'#E3F2FD',def:'A bra that compresses and redistributes breast tissue across a wider area of the cup to visually reduce and flatten the bust under clothing.',details:[]},
  {type:'Longline bra',cat:'Intimates',icon:'📏',color:'#FFEBEE',def:'A bra that extends from the bust down to the waist or ribcage, giving torso smoothing and control in addition to bust support.',details:[]},
  {type:'Bustier',cat:'Intimates',icon:'💃',color:'#FFF0F5',def:'A structured, often boned or laced longline bra-top that shapes the torso as well as the bust. Frequently strapless — blurs the line between bra and shapewear.',details:[]},
  {type:'Socks',cat:'Intimates',icon:'🧦',color:'#ECEFF1',def:'Fabric coverings for the feet worn inside shoes. Available in countless lengths, fabrics and patterns — from no-show to over-the-knee.',details:[]},
  // SWIMWEAR
  {type:'Swimwear',cat:'Swimwear',icon:'🏊',color:'#E3F2FD',def:'A general term for any garment designed to be worn in water. Covers all styles from one-pieces to bikinis.',details:[]},
  {type:'Bikini',cat:'Swimwear',icon:'👙',color:'#FFF0F5',def:'A two-piece swimsuit consisting of a top and bottom. Available in countless cuts from triangle to bandeau tops and brief to high-waisted bottoms.',details:[]},
  {type:'One-piece',cat:'Swimwear',icon:'🩱',color:'#E8F4FD',def:'A single-piece swimsuit covering the torso. Ranges from sporty to fashion styles — can be cut high or low, with or without cutouts.',details:[]},
  {type:'Tankini',cat:'Swimwear',icon:'🎽',color:'#E8F5E9',def:'A two-piece swimsuit with a tank-style top that falls loosely over the midriff, paired with separate bottoms. Combines the coverage of a one-piece with the convenience of a two-piece.',details:[]},
  {type:'Skirtini',cat:'Swimwear',icon:'👗',color:'#FDF0F8',def:'A two-piece swimsuit with a flirty attached or matching skirt worn over the bottoms instead of standard bikini bottoms. Offers extra hip and thigh coverage while keeping a feminine, playful silhouette.',details:[]},
  {type:'Bathing suit',cat:'Swimwear',icon:'🏖️',color:'#FFF8E1',def:'A structured, often shirred one-piece with a fitted bodice, sometimes finished with a small skirt panel — evocative of vintage pin-up swimwear. Also used generally as another term for a swimsuit.',details:[]},
  // OTHER ACCESSORIES
  {type:'Belt',cat:'Other accessories',icon:'👔',color:'#FFF3E0',def:'A strip of leather, fabric or chain worn around the waist or hips to cinch clothing or as a decorative accessory.',details:[]},
  {type:'Scarf',cat:'Other accessories',icon:'🧣',color:'#E8F4FD',def:'A length of fabric worn around the neck, head or shoulders for warmth or as a fashion accessory. Available in countless fabrics from wool to silk.',details:[]},
  {type:'Sunglasses',cat:'Other accessories',icon:'🕶️',color:'#ECEFF1',def:'Tinted lenses in a frame worn to protect the eyes from the sun. Also a major fashion accessory — the frame shape defines the look.',details:[]},
  {type:'Gloves',cat:'Other accessories',icon:'🧤',color:'#E8F5E9',def:'Coverings for the hands with separate sections for each finger. Worn for warmth or as a fashion accessory in leather, wool or fabric.',details:[]},
  {type:'Other',cat:'Other accessories',icon:'📦',color:'#F5F5F5',def:'Anything that does not fit neatly into another category. A catch-all for unique, unusual or uncategorised pieces.',details:[]},
  // FABRIC TYPES
  {type:'Cotton',cat:'Fabric Types',icon:'🌱',color:'#E8F5E9',def:'The most widely used natural fabric in the world — made from the fibres of the cotton plant. Soft against the skin, breathable, moisture-absorbent and durable. Hypoallergenic and comfortable in all seasons. Machine washable and easy to care for. Available in countless weights and weaves from delicate voile to sturdy canvas.',details:[]},
  {type:'Linen',cat:'Fabric Types',icon:'🌾',color:'#FFF8E1',def:'A natural fabric made from flax plant fibres — one of the oldest textiles in history. Lightweight, breathable and naturally textured. Absorbs moisture quickly and dries fast — the coolest natural fabric available. Gets softer with every wash. Wrinkles easily but many consider this part of its charm. Ideal for warm weather clothing.',details:[]},
  {type:'Silk',cat:'Fabric Types',icon:'✨',color:'#FDF0F8',def:'A luxury natural protein fibre produced by silkworms. Incredibly smooth, soft and lustrous with a natural sheen. Temperature regulating — warm in winter and cool in summer. Drapes beautifully and feels weightless against the skin. One of the strongest natural fibres despite its delicate appearance. Requires careful hand washing or dry cleaning.',details:[]},
  {type:'Satin',cat:'Fabric Types',icon:'💫',color:'#FFF0F5',def:'A weave structure rather than a fibre — creating a smooth glossy surface on one side and a matte finish on the other. Can be made from silk, polyester, nylon or other fibres. The glossy side catches light beautifully. Drapes elegantly and feels smooth against the skin. Common in eveningwear, lingerie, blouses and lining.',details:[]},
  {type:'Velvet',cat:'Fabric Types',icon:'🟣',color:'#F3F0FF',def:'A soft luxurious fabric with a short dense pile cut evenly to create a rich surface that catches light differently from different angles. Originally made from silk, now commonly in cotton, polyester or synthetic blends. Heavy and warm with a distinctive texture. Associated with evening wear, statement pieces and autumn and winter dressing.',details:[]},
  {type:'Denim',cat:'Fabric Types',icon:'👖',color:'#E3F2FD',def:'A sturdy woven cotton fabric in a diagonal twill weave, traditionally dyed with indigo. The most culturally significant fabric in fashion history — from workwear to high fashion. Gets softer and more characterful with age and wear. Available in countless weights and washes. Durable, versatile and endlessly adaptable.',details:[]},
  {type:'Knit',cat:'Fabric Types',icon:'🧶',color:'#FFF3E0',def:'Fabric created by interlocking loops of yarn — giving it natural stretch and recovery. Comfortable, soft and moves with the body rather than against it. Ranges from fine jersey to chunky cable knit. Does not fray when cut. Includes jersey, ribbed, interlock and cable knit variations. Used in everything from T-shirts to coats.',details:[]},
  {type:'Chiffon',cat:'Fabric Types',icon:'🌬️',color:'#E8F4FD',def:'A very lightweight, sheer woven fabric in silk or polyester with a slightly rough texture and a beautiful floaty drape. Soft and delicate — layers well and adds an ethereal quality to any garment. Sheer enough to see through so is often lined or layered. Common in evening wear, blouses, overlays and formal dresses.',details:[]},
  {type:'Leather',cat:'Fabric Types',icon:'🖤',color:'#263238',def:'Animal hide treated and tanned to create a durable structured material. The most iconic fabric in fashion — adds instant edge to any outfit. Available in full grain (most durable), suede (soft napped finish) and faux varieties. Gets better with age as it moulds to the body. Water resistant and extremely long-lasting.',details:[]},
  {type:'Lace',cat:'Fabric Types',icon:'🕸️',color:'#FDF0F8',def:'A delicate openwork fabric made by looping, twisting or knitting fine threads into intricate floral or geometric patterns. Traditionally made from silk or linen, now commonly in cotton or synthetic fibres. Sheer and decorative — used as a standalone fabric or as a trim. Feminine, delicate and associated with luxury and romance.',details:[]},
  {type:'Jersey',cat:'Fabric Types',icon:'👕',color:'#E8F4FD',def:'A soft stretchy knit fabric originally made from wool, now commonly in cotton, polyester or blends. The fabric of everyday T-shirts and casual dresses. Comfortable, drapes well and moves freely with the body. Does not wrinkle easily. Available in single jersey (lighter, used in T-shirts) and double jersey (heavier, more structured).',details:[]},
  {type:'Tweed',cat:'Fabric Types',icon:'🟤',color:'#FFF3E0',def:'A rough textured woven wool fabric with a distinctive flecked or herringbone appearance, traditionally produced in Scotland and Ireland. Durable, warm and wind-resistant. Originally country and equestrian wear, now associated with academic and heritage fashion. Has a characterful, handcrafted quality.',details:[]},
  {type:'Cashmere',cat:'Fabric Types',icon:'🐐',color:'#FFF8E1',def:'A luxury natural fibre from the soft undercoat of cashmere goats — significantly finer and softer than regular wool. Incredibly soft to the touch, lightweight and exceptionally warm. One of the most prized natural fibres in the world. Pills with heavy wear but improves with gentle de-pilling. Requires hand washing or dry cleaning.',details:[]},
  {type:'Wool',cat:'Fabric Types',icon:'🐑',color:'#ECEFF1',def:'A natural fibre from sheep fleece — one of the most ancient and versatile textiles. Naturally warm, breathable and moisture-wicking. Has a natural crimp that traps air for insulation — warm even when damp. Naturally odour-resistant. Ranges from fine merino (soft and next-to-skin) to chunky bouclé (textured and structured).',details:[]},
  {type:'Polyester',cat:'Fabric Types',icon:'🔬',color:'#E8F5E9',def:'The most widely used synthetic fabric globally — made from petroleum-based fibres. Durable, wrinkle-resistant, colourfast and easy to care for. Quick-drying and resistant to shrinking and stretching. Less breathable than natural fibres. Widely used in fast fashion and blended with natural fibres to improve performance.',details:[]},
  {type:'Polyamide',cat:'Fabric Types',icon:'⚡',color:'#E3F2FD',def:'A synthetic fabric also known as nylon. One of the strongest and most abrasion-resistant synthetic fibres. Lightweight, smooth, quick-drying and resistant to damage. Commonly used in activewear, swimwear, hosiery and outerwear. Holds colour well and dries very quickly. Often blended with elastane for added stretch.',details:[]},
  {type:'Modal',cat:'Fabric Types',icon:'🌿',color:'#E8F5E9',def:'A semi-synthetic fabric made from beech tree pulp — softer than cotton and incredibly smooth against the skin. Highly breathable, moisture-wicking and resistant to shrinking and fading. Drapes beautifully. Commonly used in underwear, loungewear, T-shirts and sleepwear. Considered more sustainable than regular viscose.',details:[]},
  {type:'Mesh',cat:'Fabric Types',icon:'🥅',color:'#ECEFF1',def:'An open net-like fabric with a regular pattern of evenly spaced holes. Lightweight, breathable and very flexible. Used in sportswear for ventilation, layering pieces for texture and statement tops and dresses for an edgy, fashion-forward look. Can be fine and delicate or bold and chunky.',details:[]},
  {type:'Organza',cat:'Fabric Types',icon:'🌸',color:'#FFF0F5',def:'A thin, lightweight, stiff and sheer fabric in silk or synthetic fibres. Holds its shape exceptionally well unlike most sheer fabrics — perfect for structured skirts, dramatic sleeves and overlays that maintain volume. Crisp to the touch with a subtle sheen. Common in evening wear and bridal fashion.',details:[]},
  {type:'Fleece',cat:'Fabric Types',icon:'☁️',color:'#F5F5F5',def:'A soft synthetic knitted fabric with a brushed, fluffy pile designed to trap warmth. Lightweight and incredibly warm relative to its weight. Breathable, moisture-wicking and quick-drying. Commonly used in casual outerwear, hoodies and loungewear. Does not absorb water readily — stays warm even when damp.',details:[]},
  {type:'Nylon',cat:'Fabric Types',icon:'💪',color:'#E3F2FD',def:'One of the first synthetic fabrics ever created. Strong, lightweight, smooth and highly resistant to abrasion, heat and moisture. Quick-drying and easy to care for. Used in activewear, hosiery, swimwear and outerwear linings. Often blended with other fibres to add strength and durability.',details:[]},
  {type:'Sequin fabric',cat:'Fabric Types',icon:'✨',color:'#FFF8E1',def:'Fabric covered in small flat shiny discs sewn or glued onto a base fabric — catching and reflecting light with every movement. Glamorous, eye-catching and instantly festive. Heavy relative to its appearance. Common in evening wear, party dresses and performance pieces. Best kept to one statement piece per outfit.',details:[]},
  {type:'Viscose',cat:'Fabric Types',icon:'🌳',color:'#E8F5E9',def:'A semi-synthetic fabric made from wood pulp cellulose — designed as an affordable alternative to silk. Incredibly drapey, soft and fluid with a subtle sheen. Breathable and comfortable against the skin. Accepts dye very well giving rich vibrant colours. Can shrink and distort when wet so requires gentle care. Also known as rayon.',details:[['Also called','Rayon'],['Also called','Semi-synthetic, plant-based cellulose']]},
  {type:'Crepe',cat:'Fabric Types',icon:'〰️',color:'#F3F0FF',def:'A fabric with a distinctive crinkled, pebbled or bumpy surface texture created by a special weaving or twisting technique. Can be made from silk, wool, polyester or other fibres. Lightweight to medium weight. Drapes beautifully, resists wrinkles and moves elegantly. A sophisticated, fashion-forward fabric used in dresses, blouses and tailored pieces.',details:[]},
  {type:'Bamboo',cat:'Fabric Types',icon:'🎋',color:'#E8F5E9',def:'A sustainable semi-synthetic fabric made from bamboo plant pulp. Exceptionally soft — often compared to cashmere in feel. Naturally moisture-wicking, breathable and antibacterial. Biodegradable and grows without pesticides. Resistant to odour. Commonly used in underwear, loungewear, T-shirts and socks. An eco-friendly alternative to synthetic fabrics.',details:[]},
  {type:'Acrylic',cat:'Fabric Types',icon:'🧪',color:'#E3F2FD',def:'A synthetic fabric designed as a lightweight affordable alternative to wool. Soft, warm and resistant to moths, sunlight and moisture. Holds its shape well and is easy to care for — usually machine washable. Less breathable than natural wool. Commonly used in knitwear, jumpers, blankets and outdoor textiles. Often blended with wool for added softness.',details:[]},
  {type:'Spandex',cat:'Fabric Types',icon:'💪',color:'#FFF0F5',def:'A synthetic stretch fibre — one of the most elastic materials in existence, capable of stretching up to 600% of its original length and snapping back perfectly. Never used alone but always blended with other fabrics to add stretch, recovery and comfort. Even a 2-5% spandex content transforms a fabric. Found in activewear, swimwear, jeans, leggings and bodysuits.',details:[['Also called','Elastane, Lycra']]},
  // PRINTS & PATTERNS
  {type:'Stripe',cat:'Prints & Patterns',icon:'〰️',color:'#E8F4FD',def:'Parallel lines of alternating colours running horizontally, vertically or diagonally across fabric.',details:[]},
  {type:'Plaid',cat:'Prints & Patterns',icon:'🔲',color:'#ECEFF1',def:'A pattern of intersecting horizontal and vertical lines in multiple colours forming a grid or checked design.',details:[]},
  {type:'Tartan',cat:'Prints & Patterns',icon:'🏴',color:'#FFEBEE',def:'A specific type of plaid with a distinctive criss-cross pattern associated with Scottish clans. Each tartan has a specific colour combination.',details:[]},
  {type:'Floral',cat:'Prints & Patterns',icon:'🌸',color:'#FFF0F5',def:'A pattern featuring flowers, leaves or botanical elements. Ranges from delicate small prints to large dramatic blooms.',details:[]},
  {type:'Animal print',cat:'Prints & Patterns',icon:'🐆',color:'#FFF8E1',def:'A pattern mimicking the markings of animals — leopard, zebra, snake, tiger and cheetah being the most common.',details:[]},
  {type:'Geometric',cat:'Prints & Patterns',icon:'🔷',color:'#E3F2FD',def:'A pattern made from geometric shapes — circles, triangles, hexagons or abstract angular forms.',details:[]},
  {type:'Paisley',cat:'Prints & Patterns',icon:'🌀',color:'#F3F0FF',def:'A curved teardrop-shaped motif of Indian origin with intricate interior detail. Bohemian and vintage in feel.',details:[]},
  {type:'Polka dot',cat:'Prints & Patterns',icon:'⚪',color:'#F5F5F5',def:'A pattern of evenly spaced filled circles of equal size on a contrasting background.',details:[]},
  {type:'Tie-dye',cat:'Prints & Patterns',icon:'🌈',color:'#FFF3E0',def:'A pattern created by binding and dyeing fabric — resulting in swirling organic patterns in multiple colours.',details:[]},
  {type:'Abstract',cat:'Prints & Patterns',icon:'🎨',color:'#FFF0F5',def:'A non-representational pattern with no recognisable subject — freeform shapes, brushstrokes or organic forms.',details:[]},
  {type:'Houndstooth',cat:'Prints & Patterns',icon:'🔳',color:'#ECEFF1',def:'A duotone textile pattern with broken checks in a distinctive pointed four-pointed shape.',details:[]},
  {type:'Camouflage',cat:'Prints & Patterns',icon:'🌿',color:'#E8F5E9',def:'A pattern of irregular shapes in earthy greens, browns and blacks originally designed for military concealment.',details:[]},
  {type:'Ditsy',cat:'Prints & Patterns',icon:'🌼',color:'#FFF8E1',def:'A small scattered all-over print — usually tiny florals or dots on a light background.',details:[]},
  {type:'Gingham',cat:'Prints & Patterns',icon:'🔲',color:'#E8F4FD',def:'A plain-woven cotton fabric with a simple checked pattern in white and one other colour — usually in small even checks.',details:[]},
  // EMBELLISHMENTS
  {type:'Ruffle',cat:'Embellishments',icon:'🌊',color:'#FDF0F8',def:'A gathered or pleated strip of fabric attached at one edge creating a wavy decorative frill. Adds femininity and movement.',details:[]},
  {type:'Frill',cat:'Embellishments',icon:'🌸',color:'#FFF0F5',def:'Similar to a ruffle — a decorative gathered or pleated fabric strip. Usually lighter and more delicate than a ruffle.',details:[]},
  {type:'Embroidery',cat:'Embellishments',icon:'🪡',color:'#E8F5E9',def:'Decorative needlework stitched directly onto fabric — in thread, yarn or other materials. Can be floral, geometric or figurative.',details:[]},
  {type:'Sequins',cat:'Embellishments',icon:'✨',color:'#FFF8E1',def:'Small shiny discs sewn onto fabric to catch and reflect light. Glamorous and festive — associated with evening wear.',details:[]},
  {type:'Beading',cat:'Embellishments',icon:'📿',color:'#F3F0FF',def:'Decorative beads sewn onto fabric to create patterns or texture. Can be glass, plastic or crystal.',details:[]},
  {type:'Lace trim',cat:'Embellishments',icon:'🕸️',color:'#FDF0F8',def:'A border of delicate lace applied to the edge of a garment — at the hem, neckline or cuffs.',details:[]},
  {type:'Broderie anglaise',cat:'Embellishments',icon:'🌼',color:'#FFF8E1',def:'A form of embroidery featuring cut-out eyelet holes edged with stitching in floral or geometric patterns. Light, white and summery.',details:[]},
  {type:'Smocking',cat:'Embellishments',icon:'🧵',color:'#FFF0F5',def:'A decorative technique where fabric is gathered with stitching to create a textured elastic effect. Traditional and artisanal.',details:[]},
  {type:'Pleating',cat:'Embellishments',icon:'📐',color:'#E8F4FD',def:'Folds of fabric stitched into place to add volume or texture. Includes box pleats, knife pleats and accordion pleats.',details:[]},
  {type:'Patchwork',cat:'Embellishments',icon:'🧩',color:'#FFF3E0',def:'Pieces of different fabrics sewn together to create a larger patterned piece. Bohemian and craft-inspired.',details:[]},
  {type:'Fringe',cat:'Embellishments',icon:'〰️',color:'#FFF8E1',def:'Strips or threads hanging freely from the edge of a garment. Adds movement and a bohemian or western feel.',details:[]},
  {type:'Quilting',cat:'Embellishments',icon:'🔷',color:'#E3F2FD',def:'A technique of stitching through multiple layers of fabric to create a padded textured surface with a decorative pattern.',details:[]},
  {type:'Feather trim',cat:'Embellishments',icon:'🪶',color:'#FDF0F8',def:'Decorative feathers attached to the hem, neckline or cuffs of a garment. Dramatic and glamorous.',details:[]},
  {type:'Rhinestone',cat:'Embellishments',icon:'💎',color:'#F3F0FF',def:'Small faceted crystals or glass stones applied to fabric for sparkle and decoration.',details:[]},
  // CLOSURES & DETAILS
  {type:'Zip',cat:'Closures & Details',icon:'🔒',color:'#ECEFF1',def:'A fastening made of two rows of interlocking teeth joined by a sliding tab. Practical and modern — used in countless garment types.',details:[]},
  {type:'Button',cat:'Closures & Details',icon:'🔘',color:'#E8F4FD',def:'A small disc fastened through a buttonhole to close a garment. The most classic fastening — in plastic, metal, shell or fabric.',details:[]},
  {type:'Hook and eye',cat:'Closures & Details',icon:'🪝',color:'#F5F5F5',def:'A small metal hook and loop fastening used at waistbands, necklines and bra closures. Invisible and secure.',details:[]},
  {type:'Lace-up',cat:'Closures & Details',icon:'👟',color:'#FFF3E0',def:'A fastening using a cord or ribbon threaded through eyelets. Adjustable and decorative — used on corsets, boots and some garments.',details:[]},
  {type:'Wrap fastening',cat:'Closures & Details',icon:'🌀',color:'#FDF0F8',def:'A garment fastened by wrapping one side over the other and tying — creating an adjustable flattering fit.',details:[]},
  {type:'Tie fastening',cat:'Closures & Details',icon:'🎀',color:'#FFF0F5',def:'A ribbon, cord or fabric strip that ties to fasten or decorate a garment. Can be at the neck, waist or sleeves.',details:[]},
  {type:'Drawstring',cat:'Closures & Details',icon:'🪢',color:'#FFF8E1',def:'A cord threaded through a channel that can be pulled to gather or tighten fabric — at waists, hoods or hems.',details:[]},
  {type:'Snap',cat:'Closures & Details',icon:'🔩',color:'#E8F5E9',def:'A small metal or plastic press-stud fastening that clicks together. Quick and easy — used on casual pieces.',details:[]},
  {type:'Velcro',cat:'Closures & Details',icon:'🔗',color:'#E3F2FD',def:'A hook-and-loop fastening that sticks together when pressed. Practical and adjustable — used in sportswear and casual pieces.',details:[]},
  {type:'Buckle',cat:'Closures & Details',icon:'🔧',color:'#FFF3E0',def:'A metal or plastic frame with a hinged pin used to fasten straps — on belts, bags and shoes.',details:[]},
  {type:'Toggle',cat:'Closures & Details',icon:'🪵',color:'#E8F5E9',def:'A rod-shaped fastening pushed through a loop — traditional on duffle coats and outdoor wear.',details:[]},
  // SILHOUETTES
  {type:'Hourglass',cat:'Silhouettes',icon:'⏳',color:'#FDF0F8',def:'A silhouette that is fitted at the bust and hips with a dramatically nipped-in waist — creating a curved figure-eight shape.',details:[]},
  {type:'Column',cat:'Silhouettes',icon:'🏛️',color:'#ECEFF1',def:'A straight narrow silhouette with the same width from shoulder to hem — elongated and minimal.',details:[]},
  {type:'A-line silhouette',cat:'Silhouettes',icon:'🔺',color:'#FFF0F5',def:'Fitted at the top and gradually flaring outward toward the hem — like the letter A. Universally flattering.',details:[]},
  {type:'Trapeze',cat:'Silhouettes',icon:'🎪',color:'#E8F4FD',def:'A silhouette fitted at the shoulders and dramatically flaring outward toward the hem — wider than an A-line.',details:[]},
  {type:'Empire silhouette',cat:'Silhouettes',icon:'👑',color:'#F3F0FF',def:'Fitted just below the bust with a loose flowing skirt falling from a high waistline.',details:[]},
  {type:'Cocoon',cat:'Silhouettes',icon:'🥚',color:'#FFF8E1',def:'A rounded oversized silhouette that is wider in the middle than at the shoulders and hem — cocooning the body.',details:[]},
  {type:'Peplum silhouette',cat:'Silhouettes',icon:'🔔',color:'#FFF0F5',def:'A fitted bodice with a short flared frill at the waist that creates volume at the hip.',details:[]},
  {type:'Balloon',cat:'Silhouettes',icon:'🎈',color:'#E8F5E9',def:'A rounded voluminous silhouette that puffs out like a balloon — either in the skirt, sleeves or overall shape.',details:[]},
  {type:'Shift silhouette',cat:'Silhouettes',icon:'⬜',color:'#F5F5F5',def:'A straight boxy silhouette with no waist definition — falling loosely from shoulder to hem.',details:[]},
  {type:'Mermaid',cat:'Silhouettes',icon:'🧜',color:'#E3F2FD',def:'Fitted through the bodice, waist and hips then flaring dramatically from the knee — like a mermaid tail.',details:[]},
  // HEEL HEIGHTS
  {type:'Flat',cat:'Heel Heights',icon:'⬜',color:'#F5F5F5',def:'No heel at all — the sole sits level with the ground. Comfortable and versatile, from ballet flats to sneakers.',details:[]},
  {type:'Kitten heel',cat:'Heel Heights',icon:'🐾',color:'#FDF0F8',def:'A very short, slim heel of around 1–1.5 inches. Elegant and easy to walk in — a subtle step up from flat.',details:[]},
  {type:'Low heel',cat:'Heel Heights',icon:'👠',color:'#FFF0F5',def:'A modest heel of around 1.5–2 inches. Comfortable enough for all-day wear while still adding polish.',details:[]},
  {type:'Mid heel',cat:'Heel Heights',icon:'👠',color:'#F3F0FF',def:'A medium heel of around 2.5–3 inches. A balance between comfort and height — the most versatile heel range.',details:[]},
  {type:'High heel',cat:'Heel Heights',icon:'👠',color:'#FFF3E0',def:'A tall heel of around 3.5–4 inches or more. Dramatic and formal, elongating the leg but less practical for long wear.',details:[]},
  {type:'Stiletto heel',cat:'Heel Heights',icon:'📌',color:'#263238',def:'A tall, very thin heel, often 3–5 inches. The most striking and least stable heel shape — glamorous but demanding.',details:[]},
  {type:'Block heel',cat:'Heel Heights',icon:'🧱',color:'#ECEFF1',def:'A thick, sturdy heel of any height that stays a similar width from top to bottom. More stable and comfortable than a stiletto.',details:[]},
  {type:'Wedge heel',cat:'Heel Heights',icon:'🔺',color:'#E8F5E9',def:'A heel that runs the full length of the shoe from toe to heel as a solid triangular base. Distributes weight evenly for comfort at height.',details:[]},
  {type:'Platform heel',cat:'Heel Heights',icon:'🔲',color:'#FFF8E1',def:'A heel paired with a thick platform under the front of the foot, which reduces the effective incline. Adds height without as steep an angle.',details:[]},
  // NECKLINES
  {type:'Crew neck',cat:'Necklines',icon:'⭕',color:'#E8F4FD',def:'A round collarless neckline that sits close to the base of the neck. One of the most common necklines in knitwear and T-shirts.',details:[['Also called','Round neck'],['Depth','High — sits at the collarbone']]},
  {type:'V-neck',cat:'Necklines',icon:'🔻',color:'#FDF0F8',def:'A neckline cut in a V-shape pointing down towards the chest. The depth varies from shallow to plunging.',details:[['Depth range','Shallow to deep plunge']]},
  {type:'Square neck',cat:'Necklines',icon:'⬜',color:'#FFF0F5',def:'A neckline cut in a straight horizontal line across the chest with squared corners.',details:[['Shape','Straight across with right-angle corners']]},
  {type:'Scoop neck',cat:'Necklines',icon:'🥣',color:'#E8F5E9',def:'A wide rounded neckline that scoops low across the chest, sitting wider than a crew neck.',details:[['Shape','Wide curved U-shape']]},
  {type:'Boat neck',cat:'Necklines',icon:'⛵',color:'#E3F2FD',def:'A wide neckline running horizontally from shoulder to shoulder following the line of the collarbone.',details:[['Also called','Bateau neck']]},
  {type:'Off-shoulder',cat:'Necklines',icon:'✨',color:'#FFF8E1',def:'A neckline sitting below both shoulders, leaving the collarbone and shoulders bare. Held up with elastic or boning.',details:[]},
  {type:'One-shoulder',cat:'Necklines',icon:'🔺',color:'#FDF0F8',def:'An asymmetric neckline with one shoulder covered and one completely bare.',details:[]},
  {type:'Halter neck',cat:'Necklines',icon:'🎯',color:'#FFF3E0',def:'Straps or fabric rise from the bust and tie or fasten at the back of the neck — leaving the shoulders, sides and entire back completely bare. The neck fastening supports the garment without any shoulder straps. Straps can be thick or thin and the front can vary from straight to V-shaped. Ideal for showing off toned shoulders and arms. No regular bra can be worn — the neck fastening provides all the support.',details:[]},
  {type:'Cowl neck',cat:'Necklines',icon:'🌊',color:'#F3F0FF',def:'A soft neckline created by extra fabric cut with additional width that naturally falls into loose elegant folds around the neck and chest. The drape varies — a gentle cowl is subtle while a deep cowl is dramatic. Flatters all bust sizes. Requires a soft fluid fabric such as silk, satin or jersey to drape correctly — structured fabrics will not work. Common in evening dresses and silky blouses.',details:[['Drape','Loose folds at front']]},
  {type:'Turtleneck',cat:'Necklines',icon:'🐢',color:'#ECEFF1',def:'A high close-fitting folded collar that covers the neck completely, folding over on itself.',details:[['Also called','Polo neck, rollneck']]},
  {type:'Mock neck',cat:'Necklines',icon:'📏',color:'#E8F5E9',def:'A high close-fitting collar that stands up but does not fold over — shorter than a turtleneck.',details:[['Also called','Funnel neck']]},
  {type:'Sweetheart neck',cat:'Necklines',icon:'💗',color:'#FFF0F5',def:'A neckline shaped like the top of a heart — two curved edges meeting at a dipped centre point. Typically strapless, with the heart shape providing structure without straps, though it can appear with thin straps too. Romantic and elegant — one of the most popular bridal necklines. Highlights the bust and collarbone beautifully. Works especially well for fuller busts as it provides natural structure and a flattering frame. Often boned to stay in place.',details:[['Shape','Two curves meeting at a centre dip']]},
  {type:'Keyhole neck',cat:'Necklines',icon:'🔑',color:'#FFF8E1',def:'A neckline with a small cutout opening at the front or back, shaped like an old-fashioned keyhole.',details:[['Shape','Small circular or teardrop opening']]},
  {type:'Plunging neck',cat:'Necklines',icon:'⬇️',color:'#FDF0F8',def:'A very deep V or straight neckline extending well down the chest, sometimes to the sternum or below.',details:[['Depth','Deep — well below the bust']]},
  {type:'Bardot neck',cat:'Necklines',icon:'💃',color:'#FFF0F5',def:'Named after French actress Brigitte Bardot who made it iconic in the 1960s. Sits just below and across the shoulders — slightly different from a true off-shoulder because it rests more securely on the upper arms rather than below them. Exposes the collarbones and shoulders in a romantic, vintage-inspired way. Can have sleeves that start further down the arm. Flattering for most body types — especially those wanting to show off the shoulders and collarbone while keeping a secure, non-slipping fit.',details:[['Also called','Off-shoulder, Bardot'],['Shape','Sits across upper arms below the shoulders']]},
  {type:'Queen Anne neck',cat:'Necklines',icon:'👑',color:'#F3F0FF',def:'A distinctive neckline that is high and collar-like at the back of the neck, then dips down into a sweetheart or scoop shape at the front. Named after Queen Anne of England. Regal, vintage and elegant — popular in bridal and formal wear. Frames the face beautifully with the raised back collar while still showing the décolletage at the front.',details:[['Shape','High back collar, sweetheart or scoop front'],['Also called','Queen Anne neckline']]},
  {type:'Portrait neck',cat:'Necklines',icon:'🖼️',color:'#E3F2FD',def:'A wide, sweeping neckline that extends from the centre of the chest all the way to the tips of the shoulders — like a frame around the face and upper body. Wider than a boat neck and deeper than an off-shoulder. Highlights the collarbone and shoulders beautifully. Elegant and dramatic — common in evening and formal wear.',details:[['Shape','Wide sweep from chest to shoulder tips']]},
  {type:'Racerback neck',cat:'Necklines',icon:'🏊',color:'#E8F5E9',def:'A neckline defined primarily by its back — straps on the front that meet in a T or Y shape between the shoulder blades at the back, exposing the upper back and shoulders. Gives excellent freedom of movement. Originally sportswear, now also a fashion neckline in tops and dresses. Highlights toned shoulders and back.',details:[['Also called','Racer neck'],['Shape','Straps meet in T or Y shape at back']]},
  {type:'Split neck',cat:'Necklines',icon:'✂️',color:'#ECEFF1',def:'A neckline with a vertical slit or split running down from the centre front — creating an opening that reveals a strip of chest. Can be long or short. Fastened with a button or left open. Adds a subtle, understated detail to an otherwise simple neckline. Common in blouses and casual tops.',details:[['Shape','Vertical slit at centre front'],['Also called','Notch neck, split neckline']]},
  {type:'Notch neck',cat:'Necklines',icon:'🔪',color:'#F5F5F5',def:'A round or crew neckline with a small V-notch or cutout at the centre front — adding a subtle detail to an otherwise plain neckline. Simple and understated. Common in T-shirts, blouses and casual tops. The notch adds interest without being too dramatic.',details:[['Shape','Round neck with small V-notch at centre']]},
  {type:'Smocked neck',cat:'Necklines',icon:'🧵',color:'#FFF0F5',def:'A neckline finished with smocking — decorative gathered stitching that creates an elasticated, textured band at the top of a garment. Allows the neckline to stretch and sit off the shoulder or on it depending on fit. Very common in boho and peasant-style tops and dresses. Adjustable and comfortable.',details:[['Shape','Elasticated smocked band at the neckline'],['Also called','Smock top neckline']]},
  {type:'Bib neck',cat:'Necklines',icon:'🥄',color:'#E8F4FD',def:'A neckline with an extra panel of fabric attached to the front that resembles a bib — extending from the neckline down over the chest. Can be decorative with lace or embroidery, or plain. Adds coverage and detail at the front. Common in blouses and some dresses.',details:[['Shape','Extra panel at front, bib-like']]},
  {type:'Tie neck',cat:'Necklines',icon:'🎀',color:'#FDF0F8',def:'A neckline with long fabric ties that can be tied into a bow at the front or side of the neck. The bow or knot becomes the focal point of the look. Feminine, soft and romantic — adds an immediate statement without jewellery. Common in blouses. Also called a pussy bow neckline.',details:[['Also called','Pussy bow neck'],['Shape','Neckline with fabric ties forming a bow']]},
  {type:'Jewel neck',cat:'Necklines',icon:'💎',color:'#F3F0FF',def:'A simple high round neckline sitting close to the collarbone — slightly more relaxed than a crew neck. Named because the high round shape creates the perfect frame for showcasing necklaces and jewellery. Clean, classic and sophisticated. Commonly seen in business attire, formal dresses and sleeveless blouses.',details:[['Also called','High round neck'],['Shape','High, round, close to collarbone']]},
  {type:'Surplice neck',cat:'Necklines',icon:'🌀',color:'#FDF0F8',def:'A neckline where fabric from one side crosses over the other at the front and is stitched in place — creating a fixed V-shape with a wrapped, layered effect. Often mistaken for a V-neck but features an overlapping crossover rather than a simple V cut. Naturally defines the waist and is flattering on most body types. Very common in blouses, dresses and tops.',details:[['Also called','Crossover neck, wrap neck'],['Shape','Crossover V-shape, stitched in place']]},
  {type:'Strapless',cat:'Necklines',icon:'⬆️',color:'#ECEFF1',def:'A neckline with no straps or sleeves — the garment sits above the bust held up entirely by internal boning, structure or elastic. Exposes the shoulders, collarbone and upper arms completely. Can be straight across, curved, sweetheart-shaped or asymmetric at the top edge. A canvas for statement necklaces and earrings. Common in evening gowns, bridal wear and party dresses. Usually requires a strapless or adhesive bra underneath. The boning or structure in the bodice does the holding work.',details:[['Shape','No straps — sits above the bust'],['Also called','Bandeau neckline']]},
  {type:'Illusion neck',cat:'Necklines',icon:'🔮',color:'#F3F0FF',def:'A neckline using sheer or mesh fabric — such as tulle, lace or chiffon — to create the appearance of a lower or strapless neckline while actually providing coverage, support and structure. The transparent panel blends with the skin so the bodice appears to float or sit lower than it does. Common in bridal gowns and formal evening wear where modesty and drama need to coexist. Often embellished with lace applique or beading on the sheer panel for added luxury.',details:[['Also called','Illusion neckline'],['Shape','Sheer fabric creating a floating effect']]},
  {type:'Spaghetti strap',cat:'Necklines',icon:'🍝',color:'#FFF8E1',def:'Very thin delicate straps — usually just a few millimetres wide — holding up a garment from the bust. The neckline itself can be straight, V-shaped or curved. Light, minimal and summery. Common in cami tops, slip dresses and evening wear. Great for layering under shirts or oversized knits.',details:[['Shape','Very thin straps, minimal coverage'],['Also called','Thin strap neckline']]},
  {type:'Apron neck',cat:'Necklines',icon:'🧑‍🍳',color:'#FFF3E0',def:'A neckline with a bib-like front panel that resembles the top of an apron — usually featuring straps that go up and tie at the back of the neck. The bib sits over the chest and the back is often fully open. Relaxed and summery — common in casual dresses and tops.',details:[['Shape','Bib-like front panel, ties at back of neck']]},
  {type:'U-neck',cat:'Necklines',icon:'🔡',color:'#E8F5E9',def:'A deeper and wider version of the scoop neck — cut in a clear U-shape that sits lower on the chest and opens wider toward the shoulders. More revealing than a scoop neck. Elongates the neck, highlights the collarbone and is flattering on most body types. Common in T-shirts, tanks and casual dresses.',details:[['Also called','Deep scoop neck'],['Shape','Wide deep U-shape, lower than scoop']]},
  {type:'Collar neck',cat:'Necklines',icon:'👔',color:'#EDF7ED',def:'A neckline that features a collar — a separate piece of fabric sewn onto the neckline that folds or stands up around the neck. Collars can be pointed (classic shirt collar), rounded (Peter Pan), banded (mandarin) or ruffled. Makes any outfit look more polished and put-together. Buttons let you control how much skin is shown — fully buttoned for formal, open for casual.',details:[['Also called','Collared neckline'],['Shape','Collar attached at the neckline, folds or stands']]},
  {type:'Asymmetric neck',cat:'Necklines',icon:'↗️',color:'#F3F0FF',def:'Any neckline where the two sides are different — not a mirror image of each other. The most common version is the one-shoulder style, but asymmetric necklines can also feature a high neck on one side and low on the other, cut-out details over one collarbone, or different strap widths on each side. Creates visual interest and a modern, dynamic silhouette. Flatters all body types because the diagonal line draws the eye.',details:[['Shape','Deliberately uneven — two different sides']]},
  // COLLAR STYLES
  {type:'Point collar',cat:'Collar Styles',icon:'🔺',color:'#EDF7ED',def:'The standard shirt collar with pointed tips that fold down flat against the chest. The most classic and common collar in fashion — found on dress shirts, blouses and casual shirts. The points can be short and wide or long and narrow. Fully buttoned it looks formal; left open with the top button undone it reads smart casual.',details:[['Also called','Straight collar, classic collar'],['Shape','Pointed tips folding flat against chest']]},
  {type:'Spread collar',cat:'Collar Styles',icon:'📐',color:'#E3F2FD',def:'A collar with wider-set points that spread further apart than a point collar, creating a more open V-shape at the chest. The wider spread gives a more contemporary, confident look. Works best with wider tie knots such as the Windsor. Common in formal and business shirts. More fashion-forward than the classic point collar.',details:[['Also called','Wide collar'],['Shape','Points spread wider apart than point collar']]},
  {type:'Chelsea collar',cat:'Collar Styles',icon:'💗',color:'#FDF0F8',def:'A distinctive collar with a deep V-shaped opening at the front framed by flat pointed collar pieces — inspired by 1960s and 70s fashion. The V sits lower than a standard collar. Retro, feminine and distinctive. Common in blouses and dresses of the era and cyclically returned in modern fashion.',details:[['Shape','Deep V front with flat pointed collar pieces'],['Also called','70s collar']]},
  {type:'Band collar',cat:'Collar Styles',icon:'📏',color:'#FFF8E1',def:'A collar that stands straight up around the neck with no fold-down points — essentially just the collar band with no lapel. Also called a mandarin or Nehru collar. Clean, minimal and modern. Common in contemporary shirts, blouses and East Asian-inspired garments. Usually 2-4cm tall. Creates a sleek, architectural neckline.',details:[['Also called','Mandarin collar, Nehru collar'],['Shape','Stands upright around neck, no fold or points']]},
  {type:'Peter Pan collar',cat:'Collar Styles',icon:'🌸',color:'#FFF0F5',def:'A flat collar with rounded ends that lie flat against the chest — named after the fictional character.',details:[['Shape','Flat, rounded tips']]},
  {type:'Pussy bow',cat:'Collar Styles',icon:'🎀',color:'#FFF0F5',def:'Long fabric ties at the neck that can be tied into a bow — often attached to the collar of a blouse.',details:[]},
  {type:'Revere collar',cat:'Collar Styles',icon:'🔻',color:'#E8F5E9',def:'The collar on a jacket or blazer that folds back to create lapels.',details:[['Also called','Lapel collar'],['Shape','Folds back to create lapels']]},
  // SLEEVE STYLES
  {type:'Set-in sleeve',cat:'Sleeve Styles',icon:'💪',color:'#E8F4FD',def:'The most common sleeve construction — a separate sleeve piece sewn into a rounded curved armhole. Creates a clean defined shoulder point and a tailored fit. Found in the majority of shirts, jackets and blouses. Provides structure and a polished silhouette. The sleeve head is shaped to fit the curved armhole exactly.',details:[['Also called','Classic sleeve'],['Shape','Separate piece sewn into curved armhole']]},
  {type:'Raglan sleeve',cat:'Sleeve Styles',icon:'🔗',color:'#EDF7ED',def:'A sleeve that extends in one continuous piece from the collar all the way to the cuff, with a diagonal seam running from the underarm up to the neckline rather than across the shoulder. Named after Lord Raglan, who had his coat redesigned after losing his arm at the Battle of Waterloo — the diagonal seam allowed easier dressing and more freedom of movement. No defined shoulder seam — gives a relaxed, sporty feel. Common in baseball tops, sweatshirts and casual T-shirts.',details:[['Seam','Diagonal from underarm to neckline'],['Also called','Baseball sleeve']]},
  {type:'Dolman sleeve',cat:'Sleeve Styles',icon:'🦇',color:'#F3F0FF',def:'A sleeve cut as one piece with the bodice — no separate armhole seam at all. Very wide and deep at the underarm, tapering progressively toward the wrist. Creates a dramatic batwing silhouette when arms are raised. Offers exceptional freedom of movement and a relaxed, flowing feel. Origins in the Ottoman Empire. Common in tunics, blouses and oversized tops. Sometimes has a seam down the centre back for fit.',details:[['Also called','Batwing sleeve'],['Shape','Cut as one with bodice, wide at underarm']]},
  {type:'Kimono sleeve',cat:'Sleeve Styles',icon:'🎌',color:'#FFF3E0',def:'Inspired by traditional Japanese garments, a kimono sleeve is cut as one continuous piece with the bodice — straight from shoulder to cuff with no curved armhole seam. Wide, loose and flowing with a boxy silhouette. More structured and straight than a dolman sleeve. Offers maximum comfort and ease of movement. A gusset is sometimes added under the arm for extra room. Common in robes, tunics and bohemian blouses.',details:[['Also called','Cut-in-one sleeve'],['Shape','Straight, cut as one piece with bodice']]},
  {type:'Cap sleeve',cat:'Sleeve Styles',icon:'🔘',color:'#FDF0F8',def:'An extremely short sleeve that just covers the shoulder point and the very top of the upper arm — shorter than a short sleeve. Too short to cover the armpit. Adds a delicate, feminine detail without the full coverage of a short sleeve. Flattering on most body types as it highlights the shoulder. Common in dresses, blouses and occasion tops.',details:[['Length','Just covers the shoulder point'],['Shape','Short, semi-circular at the top of the arm']]},
  {type:'Short sleeve',cat:'Sleeve Styles',icon:'👕',color:'#E8F5E9',def:'A sleeve ending between the shoulder and the elbow — typically at mid-upper arm. The most common sleeve length for casual tops and T-shirts. Covers the upper arm while keeping the forearm bare. Can be slim-fitting or slightly loose. Works in all fabric weights.',details:[['Length','Shoulder to mid-upper arm']]},
  {type:'Elbow sleeve',cat:'Sleeve Styles',icon:'📐',color:'#E3F2FD',def:'A sleeve ending at or just below the elbow. Longer than a short sleeve but shorter than three-quarter length. Practical and slightly modest — a great in-between length for transitional weather. Common in blouses and lightweight tops.',details:[['Length','Ends at or just below the elbow']]},
  {type:'Three-quarter sleeve',cat:'Sleeve Styles',icon:'📏',color:'#F3F0FF',def:'A sleeve extending approximately three-quarters of the way down the arm — ending between the elbow and the wrist. Elegant, modest and practical. Works across all seasons and formalities. One of the most universally flattering sleeve lengths as it lengthens the arm and exposes the wrist.',details:[['Length','Elbow to wrist, approx 3/4 of arm']]},
  {type:'Long sleeve',cat:'Sleeve Styles',icon:'🧥',color:'#FFF8E1',def:'A full-length sleeve extending from the shoulder all the way to the wrist. The most formal and versatile sleeve length — works in all seasons depending on fabric weight. Can be fitted, relaxed or flared at the cuff. Pairs with every garment type.',details:[['Length','Shoulder to wrist']]},
  {type:'Bell sleeve',cat:'Sleeve Styles',icon:'🔔',color:'#FDF0F8',def:'A sleeve fitted at the top and dramatically flaring outward toward the wrist like the shape of a bell or trumpet. The flare begins at or below the elbow. Bohemian, romantic and fluid — moves beautifully with the arm. Requires a soft fabric like chiffon or crepe to achieve the full flare effect. Also called a trumpet sleeve.',details:[['Also called','Trumpet sleeve'],['Shape','Fitted top, flared from elbow to wide hem']]},
  {type:'Bishop sleeve',cat:'Sleeve Styles',icon:'⛪',color:'#E8F5E9',def:'A long sleeve that is loose and full throughout the arm — billowing generously from shoulder to wrist — then gathered tightly into a fitted cuff. Creates a dramatic voluminous silhouette with the fullness controlled at the wrist. First popular in the Romantic era of the 1800s and returned in the 1960s and 70s. Associated with romance, drama and historic elegance. Common in blouses, dresses and evening wear.',details:[['Shape','Full and billowy throughout, gathered at wrist cuff']]},
  {type:'Puff sleeve',cat:'Sleeve Styles',icon:'☁️',color:'#FFF0F5',def:'A sleeve gathered at the shoulder or armhole seam to create volume and a rounded puffy shape at the top of the arm. The gathering can be at the top only (creating a shoulder puff), at both ends (shoulder and cuff), or throughout the sleeve. Youthful, feminine and romantic. A defining silhouette of the Victorian era, 1980s power fashion and modern cottagecore style. Very popular in blouses, dresses and occasion tops.',details:[['Shape','Gathered at shoulder or both ends for volume']]},
  {type:'Lantern sleeve',cat:'Sleeve Styles',icon:'🏮',color:'#FFF3E0',def:'A long sleeve that balloons out dramatically between the elbow and the wrist — then gathers again tightly at the wrist. The middle section inflates like a lantern or hot-air balloon while the ends are fitted. An architectural, sculptural sleeve with a very distinctive silhouette. More structured than a bishop sleeve. Made from stiffer fabrics like organza or structured cotton to maintain the balloon shape.',details:[['Shape','Full in the middle, fitted at shoulder and wrist']]},
  {type:'Flutter sleeve',cat:'Sleeve Styles',icon:'🦋',color:'#FFF8E1',def:'A very short, loose sleeve that falls freely from the armhole without being attached at any other point — creating a fluttering, flowing effect as the arm moves. Has no fixed hem — the fabric simply drapes. Delicate and feminine. Evocative of romance and movement. Common in summer dresses and blouses. Different from a cap sleeve as it has no fitted shape — it simply falls.',details:[['Shape','Short, loose, attached only at armhole — falls freely']]},
  {type:'Balloon sleeve',cat:'Sleeve Styles',icon:'🎈',color:'#E8F4FD',def:'A long sleeve gathered at both the shoulder and the wrist, creating an all-over rounded puffed shape throughout the entire length of the sleeve — like an inflated balloon. Different from a lantern sleeve (which only balloons in the middle) and a puff sleeve (which only puffs at the top). Dreamy, soft and romantic. Works well in lightweight fabrics like organza, chiffon or cotton voile.',details:[['Shape','Gathered at both shoulder and wrist — full throughout']]},
  {type:'Leg-of-mutton sleeve',cat:'Sleeve Styles',icon:'🍖',color:'#FFF3E0',def:'A dramatic sleeve that is extremely full and puffed at the shoulder and upper arm, then tapers gradually to fit closely from the elbow to the wrist. Resembles the shape of a leg of mutton — wide at the top, narrow at the bottom. A signature sleeve of Victorian fashion (1890s). Returns periodically in fashion as an extreme statement sleeve. Requires stiff fabric to maintain the volume at the top.',details:[['Also called','Gigot sleeve'],['Shape','Very full at shoulder, fitted from elbow to wrist']]},
  {type:'Cold shoulder',cat:'Sleeve Styles',icon:'❄️',color:'#F3F0FF',def:'A top or dress where the fabric is cut away at the shoulder area, leaving the shoulders themselves bare while the rest of the sleeve — whether long or short — continues below the gap. The cutout sits specifically at the shoulder point. Adds a flirty, contemporary detail to otherwise simple sleeves. Common in casual tops, dresses and blouses.',details:[['Shape','Cutout opening at the shoulder point']]},
  {type:'Petal sleeve',cat:'Sleeve Styles',icon:'🌸',color:'#FDF0F8',def:'A sleeve made from two overlapping curved pieces of fabric that resemble the petals of a flower. Set into the upper armhole, the two panels overlap slightly creating a layered, soft decorative effect. Usually short. Feminine and delicate. Common in blouses and occasion tops.',details:[['Shape','Two overlapping curved panels at the shoulder']]},
  {type:'Sleeveless',cat:'Sleeve Styles',icon:'🎽',color:'#E3F2FD',def:'A garment with no sleeve at all — the armhole may be narrow and structured or wide and relaxed depending on the style. Showcases the shoulders and arms completely. Can be combined with any neckline. The most minimal sleeve option — versatile and comfortable in warm weather. From tank tops to formal evening gowns.',details:[['Shape','No sleeve — open armhole only']]},
  // FITS
  {type:'Slim fit',cat:'Fits',icon:'📐',color:'#EDF7ED',def:'Cut close to the body without being tight — shaped to follow the silhouette with little extra room.',details:[['Also called','Tailored fit']]},
  {type:'Regular fit',cat:'Fits',icon:'⬜',color:'#E8F4FD',def:'The standard cut — not too fitted, not too loose. Comfortable without being baggy.',details:[['Also called','Classic fit']]},
  {type:'Relaxed fit',cat:'Fits',icon:'😌',color:'#FFF3E0',def:'Slightly looser than regular — more room through the body and arms without being oversized.',details:[]},
  {type:'Oversized',cat:'Fits',icon:'🌊',color:'#ECEFF1',def:'Deliberately much larger than the wearer — designed to look big on the body.',details:[]},
  {type:'Fitted',cat:'Fits',icon:'⏳',color:'#FDF0F8',def:'Closely cut to the body with very little extra fabric — shaped to follow the exact body contours.',details:[['Also called','Body-con fit']]},
  {type:'A-line',cat:'Fits',icon:'🔺',color:'#FFF0F5',def:'Fitted at the top and gradually flaring outward towards the hem — like the letter A.',details:[['Shape','Fitted waist, flared hem']]},
  {type:'Wide leg',cat:'Fits',icon:'🌬️',color:'#F3F0FF',def:'A very wide leg opening from the hip all the way down to the hem.',details:[]},
  {type:'Skinny',cat:'Fits',icon:'📏',color:'#FDF0F8',def:'The tightest cut — fitted and stretchy throughout the leg from waist to ankle.',details:[['Also called','Spray-on, cigarette']]},
  {type:'Flared',cat:'Fits',icon:'🔔',color:'#FFF8E1',def:'Fitted at the waist and hips, then dramatically widening from the knee into a wide hem.',details:[]},
  {type:'Tapered',cat:'Fits',icon:'🔻',color:'#E3F2FD',def:'Wider at the top and gradually narrowing toward the ankle.',details:[['Also called','Carrot leg']]},
  {type:'Bootcut',cat:'Fits',icon:'🥾',color:'#EDF7ED',def:'Fitted through the thigh and slightly flared from the knee — designed to sit over a boot.',details:[]},
  {type:'Plunge',cat:'Bra Types',icon:'📐',color:'#FDF0F8',def:'Angled cups with a very low, open centre gore that create a deep V-shaped neckline. Less padded than a push-up despite the dramatic cleavage — built for low-cut tops.',details:[['Coverage','Low, angled toward centre'],['Best for','Low-cut and V-neck tops']]},
  {type:'Demi',cat:'Bra Types',icon:'🌗',color:'#FFF0F5',def:'French for "half" — covers roughly 50 to 75% of the breast with a shallow underwire, often tilted to push breasts toward centre for cleavage. Straps sit at the outer cup edge.',details:[['Coverage','Half cup'],['Also called','Half-cup bra']]},
  {type:'Balconette',cat:'Bra Types',icon:'🏛️',color:'#E8F4FD',def:'Horizontally cut cups sitting low across the bust with straps set wide apart near the shoulders, lifting the breast up rather than pushing inward.',details:[['Coverage','Horizontal, low-cut'],['Also called','Balcony bra']]},
  {type:'Full cup',cat:'Bra Types',icon:'⬛',color:'#ECEFF1',def:'Cups that cover the entire breast for maximum coverage and support, with sturdier underwire, wider straps and more hook rows — practical for larger busts.',details:[['Coverage','Full'],['Also called','Full-coverage bra']]},
  {type:'Push-up',cat:'Bra Types',icon:'⬆️',color:'#FFF0F5',def:'Angled, padded cups that push breasts inward and upward toward centre to maximise visible cleavage, usually built on a demi-cup base.',details:[['Coverage','Half to demi, padded'],['Effect','Boosted cleavage']]},
  {type:'Sweetheart',cat:'Bra Types',icon:'💕',color:'#FFF0F5',def:'Cups shaped with a curved, heart-like top edge that mimics a sweetheart neckline, giving rounded, lifted cleavage. Common in fashion and going-out bras.',details:[['Shape','Curved heart-line top edge']]},
  {type:'Bandeau',cat:'Bra Types',icon:'➖',color:'#FFF8E1',def:'A simple stretchy band of fabric across the bust, sometimes with built-in cups. Offers little shaping or support — best suited to smaller busts.',details:[['Coverage','Straight band, minimal shaping']]},
  {type:'Racerback',cat:'Bra Types',icon:'🔀',color:'#ECEFF1',def:'Straps that converge in a T or Y shape between the shoulder blades instead of running parallel. Improves support and stops straps slipping off the shoulder.',details:[['Strap shape','T or Y, converging at back'],['Also called','Racerback bra']]},
  {type:'Brief',cat:'Panty Types',icon:'🩲',color:'#E8F4FD',def:'Waistband sits at or near the natural waist with full coverage of the front, sides and rear, and a rounded, moderate leg opening. The most conservative, everyday cut.',details:[['Coverage','Full'],['Rise','At the natural waist']]},
  {type:'High-waisted brief',cat:'Panty Types',icon:'⬆️',color:'#ECEFF1',def:'A brief taken further up the body with the waistband sitting above the navel — maximum front and rear coverage with a straighter, higher-cut leg opening.',details:[['Coverage','Full, extended'],['Also called','Granny panty']]},
  {type:'Control brief',cat:'Panty Types',icon:'🛡️',color:'#E3F2FD',def:'Cut like a high-waisted brief but made with compression or shaping fabric, giving full coverage of the abdomen, hips and rear designed to smooth and support.',details:[['Coverage','Full, compression fabric']]},
  {type:'Bikini brief',cat:'Panty Types',icon:'👙',color:'#FFF0F5',def:'A lower rise than a brief, sitting at or below the hip bone, with a higher-cut leg opening and narrower side fabric while still giving solid rear coverage.',details:[['Coverage','Moderate'],['Rise','Hip bone']]},
  {type:'Hipster',cat:'Panty Types',icon:'〰️',color:'#FFF3E0',def:'Sits a few inches below the natural waist, directly on the hips, with a wider waistband and low-cut leg holes — a hybrid between bikini and boyshort.',details:[['Coverage','Moderate'],['Rise','Below natural waist, on the hips']]},
  {type:'French cut',cat:'Panty Types',icon:'📐',color:'#FDF0F8',def:'Leg openings rise high toward the hip bone while keeping full rear coverage and a mid-to-high waist, creating an elongated leg line without exposing the cheeks.',details:[['Coverage','Full, high leg line']]},
  {type:'Cheeky',cat:'Panty Types',icon:'😏',color:'#FFF0F5',def:'Sits at hip level in front like a bikini or hipster, but the rear fabric is cut narrower so the lower curve of the buttocks is exposed — more coverage than a thong, less than a bikini.',details:[['Coverage','Low-moderate at rear']]},
  {type:'Tanga',cat:'Panty Types',icon:'🔺',color:'#F3F0FF',def:'Front and back panels joined by narrow string or thin side straps, with a small triangular back panel — more coverage than a thong or G-string, less than a bikini.',details:[['Coverage','Minimal-moderate'],['Sides','Thin strings']]},
  {type:'Brazilian',cat:'Panty Types',icon:'🌴',color:'#FFF8E1',def:'Sits low on the hips with a narrow back panel similar to a tanga but cut smaller, exposing roughly half or more of the buttocks — cheekier than a tanga.',details:[['Coverage','Minimal at rear']]},
  // HEM LENGTHS
  {type:'Micro',cat:'Hem Lengths',icon:'⬆️',color:'#FFF0F5',def:'The shortest possible hemline — sitting very high on the upper thigh, well above mid-thigh. Even shorter than a mini. Originally called a micro mini. Extremely revealing and bold. First popularised in the 1960s mod fashion movement.',details:[['Position','Very high on upper thigh']]},
  {type:'Mini',cat:'Hem Lengths',icon:'📐',color:'#FDF0F8',def:'A hemline sitting above the knee — typically at mid-thigh. The defining length of miniskirts. Flirty and youthful. Popularised by designer Mary Quant in the 1960s and cyclically one of the most fashionable hemlines ever since.',details:[['Position','Mid-thigh to just above the knee']]},
  {type:'Above the knee',cat:'Hem Lengths',icon:'🦵',color:'#FFF8E1',def:'A hemline sitting just above the knee — a little longer than a true mini but still showing most of the leg. A versatile, modest-but-not-conservative length that works across casual and smart occasions.',details:[['Position','2-5cm above the knee']]},
  {type:'Knee length',cat:'Hem Lengths',icon:'🎯',color:'#E8F5E9',def:'A hemline landing exactly at or just below the knee. One of the most classic and universally appropriate lengths. Works across all formalities from casual to business to formal. Flattering on most body types.',details:[['Position','At or just below the knee']]},
  {type:'Below the knee',cat:'Hem Lengths',icon:'📏',color:'#E3F2FD',def:'A hemline sitting a few centimetres below the knee — longer than knee length but shorter than midi. Modest and classic. Common in workwear and more conservative dress codes.',details:[['Position','3-8cm below the knee']]},
  {type:'Midi',cat:'Hem Lengths',icon:'📏',color:'#E3F2FD',def:'A hemline between the knee and the ankle — usually landing anywhere from just below the knee to mid-calf. One of the most elegant and universally flattering lengths. Works in all seasons and occasions.',details:[['Position','Below knee to mid-calf']]},
  {type:'Maxi',cat:'Hem Lengths',icon:'⬇️',color:'#F3F0FF',def:'A full-length hemline reaching the ankle — but not quite touching the floor. Typically flowing and relaxed. Elegant and bohemian. Popular in warm weather in light fabrics and in formal settings in heavier ones.',details:[['Position','Ankle length']]},
  {type:'Floor length',cat:'Hem Lengths',icon:'👑',color:'#E8F4FD',def:'A hemline that touches or grazes the floor — the longest possible hemline. The most dramatic and formal length. Common in evening gowns, bridal wear and red carpet fashion. Usually requires heels to avoid stepping on the hem.',details:[['Position','Touches or grazes the floor']]},
  {type:'Asymmetric hem',cat:'Hem Lengths',icon:'↗️',color:'#FFF3E0',def:'A hemline that is deliberately uneven — different lengths on different sides, or cut at a diagonal angle. Creates visual interest and movement. Can be subtle (slightly angled) or dramatic (very different lengths on each side).',details:[['Position','Intentionally uneven — varies around the garment']]},
  {type:'High-low hem',cat:'Hem Lengths',icon:'📈',color:'#EDF7ED',def:'An asymmetric hem where the front is significantly shorter than the back — often mini at the front and midi or maxi at the back. Shows the legs at the front while maintaining length and drama at the back.',details:[['Position','Short at front, long at back']]},
  {type:'Handkerchief hem',cat:'Hem Lengths',icon:'🔷',color:'#FFF0F5',def:'An uneven pointed hem created by draping fabric at angles — creating points that hang down like the corners of a handkerchief. Romantic, bohemian and feminine. Moves beautifully and requires soft fluid fabric.',details:[['Position','Multiple pointed panels at varying lengths']]},
  // DRESS CUTS
  {type:'Shift dress',cat:'Dress Cuts',icon:'⬜',color:'#E8F4FD',def:'A simple straight dress with minimal shaping — no defined waist, following a straight line from shoulder to hem.',details:[]},
  {type:'Wrap dress',cat:'Dress Cuts',icon:'🌀',color:'#FDF0F8',def:'A dress that wraps around the body and ties at the side, creating a V-neckline and naturally defined waist.',details:[]},
  {type:'Bodycon dress',cat:'Dress Cuts',icon:'⏳',color:'#FFF0F5',def:'A very fitted dress made from stretchy fabric that closely follows every contour of the body.',details:[['Also called','Figure-hugging, or bandage dress when made from strips of stretch fabric']]},
  {type:'Slip dress',cat:'Dress Cuts',icon:'✨',color:'#FFF8E1',def:'A lightweight bias-cut dress inspired by lingerie — typically in satin, silk or silk-like fabric with thin straps.',details:[]},
  {type:'Shirt dress',cat:'Dress Cuts',icon:'👔',color:'#EDF7ED',def:'A dress styled like an elongated shirt — with a collar, button placket and often a belted waist.',details:[]},
  {type:'Babydoll dress',cat:'Dress Cuts',icon:'🎀',color:'#FFF0F5',def:'A short dress with a fitted bodice and a loose flared skirt falling from just below the bust.',details:[]},
  {type:'Empire waist',cat:'Dress Cuts',icon:'👑',color:'#F3F0FF',def:'A dress where the waistline sits just below the bust — much higher than the natural waist.',details:[['Also called','Regency waist']]},
  {type:'Fit and flare',cat:'Dress Cuts',icon:'🔔',color:'#E8F5E9',def:'Closely fitted through the bodice and waist then flaring into a full skirt from the hips.',details:[['Also called','Skater dress, when the flared skirt is short']]},
  {type:'Column dress',cat:'Dress Cuts',icon:'🏛️',color:'#E3F2FD',def:'A straight-cut dress with consistent width from shoulder to hem — a long vertical column silhouette.',details:[['Also called','Sheath dress']]},
  {type:'Tiered dress',cat:'Dress Cuts',icon:'🎂',color:'#FFF8E1',def:'A dress constructed in horizontal layers or tiers that increase in width from top to bottom.',details:[]},
  {type:'Peplum',cat:'Dress Cuts',icon:'🔔',color:'#FFF0F5',def:'A short flared frill attached at the waist of a top or dress, creating extra volume at the hip.',details:[['Position','Attached at the natural waist']]},
  {type:'A-line dress',cat:'Dress Cuts',icon:'🔺',color:'#E8F4FD',def:'A dress fitted through the bodice and waist that flares gently outward to the hem, forming the shape of a capital letter A. Flattering on almost every body type.',details:[]},
  {type:'Tent dress',cat:'Dress Cuts',icon:'⛺',color:'#EDF7ED',def:'A loose dress that flares dramatically from the shoulders with no defined waist at all, forming a wide triangular shape. Fully conceals the body\u2019s silhouette.',details:[]},
  {type:'Trapeze dress',cat:'Dress Cuts',icon:'📐',color:'#E3F2FD',def:'A shorter, gentler cousin of the tent dress \u2014 flaring in a straight-lined A-shape from the shoulders with no waist seam. Popularised in the 1950s-60s.',details:[['Also called','Baby-doll swing dress']]},
  {type:'Sun dress',cat:'Dress Cuts',icon:'☀️',color:'#FFF8E1',def:'A light, casual warm-weather dress \u2014 typically sleeveless or with thin straps, an open neckline and a loose flowing skirt. Made from lightweight breathable fabric.',details:[]},
  {type:'Apron dress',cat:'Dress Cuts',icon:'🧑\u200d🍳',color:'#FFF3E0',def:'A dress with a bib-like front panel and straps that tie at the back of the neck and waist, resembling a kitchen apron. Usually worn over a top and often left open or laced at the back.',details:[]},
  {type:'Jumper dress',cat:'Dress Cuts',icon:'👗',color:'#F3F0FF',def:'A sleeveless dress with broad straps, designed to be worn layered over a top or blouse \u2014 like a pinafore. Often features a fitted or seamed bodice and a fuller skirt.',details:[['Also called','Pinafore dress']]},
  {type:'Pouf dress',cat:'Dress Cuts',icon:'🎈',color:'#FDF0F8',def:'A dress fitted at the waist with a skirt that puffs outward and then draws back in at the hem, creating a rounded bubble shape. Playful and voluminous.',details:[]},
  {type:'Qi Pao',cat:'Dress Cuts',icon:'🀄',color:'#FFF0F5',def:'A fitted, high-collared traditional Chinese dress with a diagonal front closure and side slits, following the body\u2019s natural lines from shoulder to hem.',details:[['Also called','Cheongsam']]},
  {type:'Bouffant dress',cat:'Dress Cuts',icon:'🎀',color:'#FFF0F5',def:'A dress fitted at the bodice and waist with a very full, gathered skirt \u2014 similar to fit and flare but with much greater volume from heavy gathering rather than seaming.',details:[]},
  {type:'Blouson dress',cat:'Dress Cuts',icon:'🫧',color:'#E8F5E9',def:'A dress with a loose bodice that blouses \u2014 bags out softly \u2014 over a fitted waistband or hip yoke, then continues into a short skirt below.',details:[]},
  {type:'Drop waist dress',cat:'Dress Cuts',icon:'⬇️',color:'#ECEFF1',def:'A dress with its waist seam sitting low at the hip rather than at the natural waist, giving a relaxed, elongated-torso silhouette. Iconic to 1920s flapper style.',details:[['Position','Seam sits at the hip, not the natural waist']]},
  {type:'Peasant dress',cat:'Dress Cuts',icon:'🌾',color:'#EDF7ED',def:'A loose, relaxed dress inspired by traditional folk clothing \u2014 often with a smocked or gathered neckline, full sleeves and a flowing skirt. A boho wardrobe staple.',details:[]},
  {type:'Bubble dress',cat:'Dress Cuts',icon:'🫧',color:'#F3F0FF',def:'A dress fitted at the waist with a short skirt that billows outward before cinching sharply back in at the hem, creating a rounded bubble shape.',details:[['Also called','Balloon dress']]},
  {type:'Pegged dress',cat:'Dress Cuts',icon:'⏳',color:'#FFF8E1',def:'A dress that is fullest at the hip and tapers narrower toward the hem \u2014 the reverse of an A-line. Creates a modern, sculpted silhouette.',details:[]},
  {type:'Yoke dress',cat:'Dress Cuts',icon:'📏',color:'#E8F4FD',def:'A dress with a fitted horizontal panel (the yoke) across the chest or shoulders, from which a fuller, often gathered skirt falls below.',details:[]},
  {type:'Tunic dress',cat:'Dress Cuts',icon:'🪭',color:'#FDF0F8',def:'A loose, simple, straight-cut dress that skims the body without shaping \u2014 short to knee-length, often worn over leggings or trousers.',details:[]},
  {type:'Princess dress',cat:'Dress Cuts',icon:'👑',color:'#F3F0FF',def:'A dress shaped using vertical princess seams running from the shoulder or armhole down to the hem \u2014 no waist seam, but a smooth, naturally curved fit.',details:[['Also called','Princess-line dress']]},
  {type:'Mermaid dress',cat:'Dress Cuts',icon:'🧜',color:'#E8F4FD',def:'A dress fitted closely from bodice through hip and thigh, then flaring out dramatically below the knee \u2014 mimicking a mermaid\u2019s tail. A dramatic, floor-length formal silhouette.',details:[['Also called','Trumpet dress, when the flare starts a little higher']]},
  {type:'Grecian dress',cat:'Dress Cuts',icon:'🏛️',color:'#E3F2FD',def:'A soft, flowing dress inspired by ancient Greek drapery \u2014 often asymmetric with one bare shoulder, gathered softly at the waist and falling in fluid folds to a long hem. Goddess-inspired and elegant.',details:[['Also called','Toga dress, Chiton dress']]},
  {type:'Kaftan dress',cat:'Dress Cuts',icon:'🧞',color:'#FFF3E0',def:'A loose, flowing dress with wide dropped sleeves and no fitted waist, usually falling to the ankle. Relaxed and breezy \u2014 a resortwear and loungewear staple with roots in Middle Eastern dress.',details:[]},
  {type:'Bustle dress',cat:'Dress Cuts',icon:'🎗️',color:'#FDF0F8',def:'A dress with fullness gathered and pulled toward the back rather than draping evenly all around, creating volume behind the waist or hip. A Victorian-inspired silhouette.',details:[]},
  {type:'Tulip dress',cat:'Dress Cuts',icon:'🌷',color:'#FDF0F8',def:'A dress with a fitted bodice and overlapping curved skirt panels that tuck under at the hem, resembling the rounded petals of a tulip flower.',details:[]},
  // SKIRT CUTS
  {type:'A-line skirt',cat:'Skirt Cuts',icon:'🔺',color:'#E8F4FD',def:'A skirt fitted at the waist that flares gradually to the hem, forming the shape of a capital letter A. Slightly touching the hips and thighs, broader at the hem \u2014 flattering on nearly every body shape.',details:[]},
  {type:'Circle skirt',cat:'Skirt Cuts',icon:'⭕',color:'#FDF0F8',def:'A skirt cut from a full circle of fabric, with the waist at the centre \u2014 giving dramatic fullness and swing with no gathering needed. Fitted at the hip and made from lightweight fabric so it moves freely.',details:[]},
